<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WR Big Rig - Shop Manager</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #111318; --bg-card: #1a1d24; --bg-input: #22262e;
            --border: #2e3340; --text: #e4e6eb; --text-muted: #8b8f9a;
            --primary: #4db86a; --primary-hover: #3a9c54;
            --green: #4db86a; --yellow: #eab308; --red: #ef4444; --orange: #f97316;
            --purple: #a855f7;
            --sidebar-w: 240px;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        button { color: inherit; font-family: inherit; }

        /* ─── Layout ─── */
        .app { display: flex; min-height: 100vh; }
        .sidebar { width: var(--sidebar-w); background: var(--bg-card); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 100; }
        .main { margin-left: var(--sidebar-w); flex: 1; padding: 24px; min-height: 100vh; }

        /* ─── Sidebar ─── */
        .sidebar-brand { padding: 20px 16px; border-bottom: 1px solid var(--border); }
        .sidebar-brand h1 { font-size: 18px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .sidebar-brand span { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; }
        .nav-section { padding: 12px 0; }
        .nav-section-title { font-size: 10px; text-transform: uppercase; color: var(--text-muted); padding: 0 16px; margin-bottom: 4px; letter-spacing: 1px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; color: var(--text-muted); font-size: 14px; transition: all 0.15s; border-left: 3px solid transparent; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(77,184,106,0.12); color: var(--primary); border-left-color: var(--primary); }
        .nav-item i { width: 18px; text-align: center; font-size: 14px; }

        /* ─── Common ─── */
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h2 { font-size: 24px; font-weight: 600; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-success { background: var(--green); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-warning { background: var(--yellow); color: #000; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .card-header h3 { font-size: 16px; font-weight: 600; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
        .stat-card .value.green { color: var(--green); }
        .stat-card .value.blue { color: var(--primary); }
        .stat-card .value.yellow { color: var(--yellow); }
        .stat-card .value.red { color: var(--red); }

        /* ─── Table ─── */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
        td { padding: 10px 12px; border-bottom: 1px solid rgba(71,85,105,0.3); vertical-align: middle; }
        tr:hover td { background: rgba(77,184,106,0.05); }
        .clickable { cursor: pointer; }

        /* ─── Status Badges ─── */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .badge-draft { background: rgba(148,163,184,0.2); color: var(--text-muted); }
        .badge-pending { background: rgba(234,179,8,0.2); color: var(--yellow); }
        .badge-approved { background: rgba(34,197,94,0.2); color: var(--green); }
        .badge-rejected { background: rgba(239,68,68,0.2); color: var(--red); }
        .badge-converted { background: rgba(168,85,247,0.2); color: var(--purple); }
        .badge-open { background: rgba(77,184,106,0.2); color: var(--primary); }
        .badge-in_progress, .badge-in-progress { background: rgba(249,115,22,0.2); color: var(--orange); }
        .badge-on_hold, .badge-on-hold { background: rgba(234,179,8,0.2); color: var(--yellow); }
        .badge-completed { background: rgba(34,197,94,0.2); color: var(--green); }
        .badge-delivered { background: rgba(168,85,247,0.2); color: var(--purple); }
        .badge-closed { background: rgba(148,163,184,0.2); color: var(--text-muted); }
        .badge-rush { background: rgba(239,68,68,0.2); color: var(--red); }
        .badge-high { background: rgba(249,115,22,0.2); color: var(--orange); }
        .badge-normal { background: rgba(77,184,106,0.2); color: var(--primary); }
        .badge-low { background: rgba(148,163,184,0.2); color: var(--text-muted); }

        /* ─── Forms ─── */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        input, select, textarea { padding: 8px 12px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; outline: none; transition: border 0.15s; }
        input:focus, select:focus, textarea:focus { border-color: var(--primary); }
        textarea { min-height: 80px; resize: vertical; font-family: inherit; }

        .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .search-bar input { flex: 1; }

        /* ─── Tabs ─── */
        .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; color: var(--text-muted); font-size: 13px; font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        /* ─── Detail View ─── */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .detail-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(71,85,105,0.2); }
        .detail-label { color: var(--text-muted); font-size: 13px; }
        .detail-value { font-size: 13px; font-weight: 500; }
        .section-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 12px; margin-top: 8px; display: flex; align-items: center; gap: 8px; }

        /* ─── Modal ─── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; max-width: 700px; width: 95%; max-height: 85vh; overflow-y: auto; }
        .modal h3 { margin-bottom: 16px; font-size: 18px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }

        /* ─── Responsive ─── */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main { margin-left: 0; }
            .detail-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ─── Utilities ─── */
        .money { font-variant-numeric: tabular-nums; }
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
        .text-muted { color: var(--text-muted); }
        .text-sm { font-size: 12px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-4 { gap: 16px; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .flex-1 { flex: 1; }
        .w-full { width: 100%; }
        .empty-state { text-align: center; padding: 48px; color: var(--text-muted); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; }

        /* ─── Login Screen ─── */
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
        .login-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 40px; width: 380px; text-align: center; }
        .login-box h1 { font-size: 24px; color: var(--text); margin-bottom: 4px; }
        .login-box .subtitle { color: var(--text-muted); font-size: 13px; margin-bottom: 28px; }
        .login-box .form-group { margin-bottom: 16px; text-align: left; }
        .login-box input { width: 100%; padding: 12px; font-size: 16px; }
        .login-box .btn { width: 100%; padding: 12px; font-size: 15px; margin-top: 8px; justify-content: center; }
        .login-error { color: var(--red); font-size: 13px; margin-top: 8px; }
        .login-logo { font-size: 48px; color: var(--primary); margin-bottom: 16px; }

        /* ─── Time Clock (Worker View) ─── */
        .clock-display { font-size: 64px; font-weight: 700; color: var(--primary); font-variant-numeric: tabular-nums; margin: 16px 0; }
        .clock-date { font-size: 16px; color: var(--text-muted); margin-bottom: 24px; }
        .clock-status { padding: 20px; border-radius: 12px; margin-bottom: 24px; font-size: 22px; font-weight: 600; }
        .clock-status.clocked-in { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
        .clock-status.clocked-out { background: rgba(148,163,184,0.15); color: var(--text-muted); border: 1px solid rgba(148,163,184,0.3); }
        .clock-btn { padding: 28px 56px; font-size: 24px; border-radius: 16px; font-weight: 700; letter-spacing: 0.5px; min-width: 250px; }
        .worker-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: var(--bg-card); border-bottom: 1px solid var(--border); }
        .worker-header h1 { font-size: 18px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
        .worker-main { padding: 24px; max-width: 900px; margin: 0 auto; }
        .worker-tabs { display: flex; gap: 0; background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 0; }
        .worker-tab { padding: 18px 28px; cursor: pointer; color: var(--text-muted); font-size: 16px; font-weight: 600; border-bottom: 3px solid transparent; transition: all 0.15s; flex: 1; text-align: center; -webkit-tap-highlight-color: transparent; }
        .worker-tab:hover { color: var(--text); }
        .worker-tab.active { color: var(--primary); border-bottom-color: var(--primary); background: rgba(255,255,255,0.03); }
        .job-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .job-card .job-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .job-card .job-title { font-weight: 600; font-size: 18px; }
        .job-card .job-detail { font-size: 15px; color: var(--text-muted); }

        /* ─── Touch Login (TecStation) ─── */
        .touch-login { min-height: 100vh; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 32px 16px; }
        .touch-login-logo { margin-bottom: 16px; }
        .touch-login h2 { color: var(--primary); font-size: 20px; margin-bottom: 24px; }
        .worker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; width: 100%; max-width: 700px; }
        .worker-card { background: var(--bg-card); border: 2px solid var(--border); border-radius: 16px; padding: 24px 12px; text-align: center; cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent; user-select: none; color: var(--text); font-family: inherit; }
        .worker-card:active { transform: scale(0.96); border-color: var(--primary); }
        .worker-card:hover { border-color: var(--primary); background: rgba(255,255,255,0.05); }
        .worker-card.selected { border-color: var(--primary); background: rgba(255,255,255,0.07); }
        .worker-card .worker-avatar { width: 64px; height: 64px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 24px; font-weight: 700; color: var(--primary); }
        .worker-card .worker-label { font-size: 15px; font-weight: 600; color: var(--text); }

        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 12px; justify-content: center; margin: 20px 0; }
        .pin-key { width: 80px; height: 70px; border-radius: 12px; border: 2px solid var(--border); background: var(--bg-card); color: #fff; font-size: 28px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; font-family: inherit; }
        .pin-key:active { background: var(--primary); color: white; transform: scale(0.95); }
        .pin-dots { display: flex; gap: 12px; justify-content: center; margin: 16px 0; }
        .pin-dot { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--border); background: transparent; }
        .pin-dot.filled { background: var(--primary); border-color: var(--primary); }

        /* ─── Touch-friendly buttons ─── */
        .touch-btn { padding: 18px 24px; font-size: 20px; border-radius: 12px; font-weight: 700; min-height: 56px; -webkit-tap-highlight-color: transparent; user-select: none; cursor: pointer; border: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; color: var(--text); font-family: inherit; }
        .touch-btn:active { transform: scale(0.97); }
        .touch-btn-primary { background: var(--primary); color: white; }
        .touch-btn-primary:hover { background: #3da85a; }
        .touch-btn-success { background: #22c55e; color: white; font-size: 28px; padding: 24px 48px; }
        .touch-btn-success:hover { background: #16a34a; }
        .touch-btn-danger { background: var(--red); color: white; font-size: 28px; padding: 24px 48px; }
        .touch-btn-danger:hover { background: #b91c1c; }
        .pin-key-back { background: var(--bg); color: var(--text-muted); font-size: 22px; font-family: inherit; }
        .touch-move-btn { padding: 14px 20px; font-size: 15px; border-radius: 10px; font-weight: 600; min-height: 48px; -webkit-tap-highlight-color: transparent; user-select: none; cursor: pointer; text-align: center; background: transparent; border: 2px solid var(--border); display: inline-flex; align-items: center; justify-content: center; gap: 6px; color: var(--text); font-family: inherit; }
        .touch-move-btn:active { transform: scale(0.96); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .picker-row:hover { background: rgba(255,255,255,0.06) !important; }
    </style>
</head>
<body>
<div id="root"></div>
<script src="/parts-catalog.js"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ═══════════════════════════════════════════════════════════
// API CLIENT
// ═══════════════════════════════════════════════════════════
const API = window.location.origin + '/api';

// Auth token stored in memory
let _authToken = localStorage.getItem('shop_token') || null;

function setAuthToken(token) {
    _authToken = token;
    if (token) localStorage.setItem('shop_token', token);
    else localStorage.removeItem('shop_token');
}

async function api(path, opts = {}) {
    const url = API + path;
    const headers = { 'Content-Type': 'application/json' };
    if (_authToken) headers['Authorization'] = `Bearer ${_authToken}`;
    const config = { headers, ...opts };
    if (config.body && typeof config.body === 'object') config.body = JSON.stringify(config.body);
    const res = await fetch(url, config);
    if (res.status === 401) {
        setAuthToken(null);
        window.dispatchEvent(new Event('auth-expired'));
        throw new Error('Session expired');
    }
    if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || `API error ${res.status}`);
    }
    return res.json();
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const fmt = (n) => n != null ? `$${Number(n).toLocaleString('en-US', {minimumFractionDigits: 2})}` : '—';
const fmtDate = (d) => d ? new Date(d + 'T00:00:00').toLocaleDateString() : '—';
const custName = (r) => r.company_name || [r.first_name, r.last_name].filter(Boolean).join(' ') || '—';
const vehDesc = (r) => [r.vehicle_year||r.year, r.vehicle_make||r.make, r.vehicle_model||r.model].filter(Boolean).join(' ') || '—';

function Badge({ status }) {
    const cls = `badge badge-${(status||'').replace(/_/g,'-')}`;
    return <span className={cls}>{(status||'').replace(/_/g,' ')}</span>;
}

function Modal({ open, onClose, title, children }) {
    if (!open) return null;
    return (
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                    <h3>{title}</h3>
                    <button className="btn btn-outline btn-sm" onClick={onClose}><i className="fas fa-times"></i></button>
                </div>
                {children}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════════
function Sidebar({ page, setPage, user, onLogout }) {
    const nav = [
        { section: 'Overview', items: [
            { id: 'dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
        ]},
        { section: 'Operations', items: [
            { id: 'estimates', icon: 'fa-file-invoice-dollar', label: 'Estimates' },
            { id: 'repair-orders', icon: 'fa-wrench', label: 'Repair Orders' },
            { id: 'production', icon: 'fa-industry', label: 'Production' },
        ]},
        { section: 'People & Contacts', items: [
            { id: 'customers', icon: 'fa-users', label: 'Customers' },
            { id: 'vehicles', icon: 'fa-car', label: 'Vehicles' },
            { id: 'insurance', icon: 'fa-shield-halved', label: 'Insurance' },
            { id: 'employees', icon: 'fa-id-badge', label: 'Employees' },
            { id: 'vendors', icon: 'fa-truck', label: 'Vendors' },
        ]},
        { section: 'Financial', items: [
            { id: 'reports', icon: 'fa-chart-bar', label: 'Reports' },
        ]},
        { section: 'Settings', items: [
            { id: 'settings', icon: 'fa-gear', label: 'Shop Settings' },
            ...(user && user.role === 'admin' ? [{ id: 'users', icon: 'fa-user-shield', label: 'User Logins' }] : []),
        ]},
    ];

    return (
        <div className="sidebar">
            <div className="sidebar-brand">
                <h1><img src="/logo.png" alt="WR Big Rig" style={{height: 36}} /></h1>
            </div>
            {nav.map(s => (
                <div className="nav-section" key={s.section}>
                    <div className="nav-section-title">{s.section}</div>
                    {s.items.map(i => (
                        <div key={i.id} className={`nav-item ${page === i.id ? 'active' : ''}`}
                             onClick={() => setPage(i.id)}>
                            <i className={`fas ${i.icon}`}></i> {i.label}
                        </div>
                    ))}
                </div>
            ))}
            {user && (
                <div style={{position: 'absolute', bottom: 0, left: 0, right: 0, padding: '12px 16px', borderTop: '1px solid var(--border)', background: 'var(--bg-card)'}}>
                    <div style={{fontSize: 12, color: 'var(--text-muted)', marginBottom: 4}}>
                        <i className="fas fa-user"></i> {user.display_name}
                    </div>
                    <div style={{fontSize: 11, color: 'var(--text-muted)', marginBottom: 8, textTransform: 'uppercase'}}>{user.role}</div>
                    <button className="btn btn-outline btn-sm w-full" onClick={onLogout} style={{justifyContent: 'center'}}>
                        <i className="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>
            )}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════
function Dashboard({ navigate }) {
    const [data, setData] = useState(null);
    useEffect(() => { api('/dashboard').then(setData).catch(console.error); }, []);
    if (!data) return <div className="empty-state"><i className="fas fa-spinner fa-spin"></i>Loading...</div>;

    return (
        <div>
            <div className="page-header"><h2>Dashboard</h2></div>
            <div className="stats-grid">
                <div className="stat-card"><div className="label">Open Repair Orders</div><div className="value blue">{data.open_ros}</div></div>
                <div className="stat-card"><div className="label">Pending Estimates</div><div className="value yellow">{data.pending_estimates}</div></div>
                <div className="stat-card"><div className="label">Total Revenue</div><div className="value green money">{fmt(data.total_revenue)}</div></div>
                <div className="stat-card"><div className="label">Outstanding Balance</div><div className="value red money">{fmt(data.outstanding_balance)}</div></div>

// ═══════════════════════════════════════════════════════════
function CustomerDetail({ id, navigate }) {
    const [c, setC] = useState(null);
    const [showVehForm, setShowVehForm] = useState(false);
    const emptyVeh = {vin:'',year:'',make:'',model:'',submodel:'',color:'',license_plate:'',license_state:'',mileage:'',notes:''};
    const [vehForm, setVehForm] = useState(emptyVeh);

    const load = () => api(`/customers/${id}`).then(setC);
    useEffect(() => { load(); }, [id]);

    const saveVehicle = async () => {
        const body = {...vehForm, customer_id: parseInt(id)};
        if (body.year) body.year = parseInt(body.year);
        body.mileage = (body.mileage_unknown || !body.mileage) ? null : parseInt(body.mileage);
        delete body.mileage_unknown;
        await api('/vehicles', { method: 'POST', body });
        setShowVehForm(false); setVehForm(emptyVeh); load();
    };

    if (!c) return <div className="empty-state"><i className="fas fa-spinner fa-spin"></i></div>;

    return (
        <div>
            <div className="page-header">
                <div className="flex items-center gap-2">
                    <button className="btn btn-outline btn-sm" onClick={() => navigate('customers')}><i className="fas fa-arrow-left"></i></button>
                    <h2>{custName(c)}</h2>
                </div>
            </div>
            <div className="detail-grid">
                <div className="card">
                    <div className="section-title"><i className="fas fa-user"></i> Contact Info</div>
                    <div className="detail-row"><span className="detail-label">Type</span><span className="detail-value">{c.customer_type}</span></div>
                    <div className="detail-row"><span className="detail-label">Phone</span><span className="detail-value">{c.phone_home||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Email</span><span className="detail-value">{c.email||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Address</span><span className="detail-value">{[c.address,c.city,c.state,c.zip_code].filter(Boolean).join(', ')||'—'}</span></div>
                </div>
                <div className="card">
                    <div className="card-header">
                        <div className="section-title" style={{margin:0}}><i className="fas fa-car"></i> Vehicles ({(c.vehicles||[]).length})</div>
                        <button className="btn btn-primary btn-sm" onClick={() => setShowVehForm(true)}><i className="fas fa-plus"></i> Add Vehicle</button>
                    </div>
                    {(c.vehicles||[]).map(v => (
                        <div key={v.id} className="detail-row clickable" onClick={() => navigate('vehicle-detail', v.id)}>
                            <span className="detail-value">{v.year} {v.make} {v.model}</span>
                            <span className="text-muted text-sm">{v.vin}</span>

                    ))}
                    {!(c.vehicles||[]).length && <div className="text-muted" style={{padding:12,fontSize:13}}>No vehicles yet</div>}

            </div>
            <div className="card mt-4">
                <div className="section-title"><i className="fas fa-wrench"></i> Repair Orders</div>
                <table><thead><tr><th>RO #</th><th>Status</th><th>Total</th><th>Created</th></tr></thead>
                <tbody>
                {(c.repair_orders||[]).map(r => (
                    <tr key={r.id} className="clickable" onClick={() => navigate('ro-detail', r.id)}>
                        <td style={{color:'var(--primary)'}}>{r.ro_number}</td><td><Badge status={r.status}/></td>
                        <td className="money">{fmt(r.total_amount)}</td><td>{fmtDate(r.create_date)}</td>
                    </tr>
                ))}
                </tbody></table>
            </div>
            <Modal open={showVehForm} onClose={() => setShowVehForm(false)} title={`Add Vehicle for ${custName(c)}`}>
                <div className="form-grid">
                    <div className="form-group"><label>Year</label><input type="number" value={vehForm.year} onChange={e => setVehForm({...vehForm, year: e.target.value})} placeholder="2024" /></div>
                    <div className="form-group"><label>Make</label><input value={vehForm.make} onChange={e => setVehForm({...vehForm, make: e.target.value})} placeholder="Peterbilt" /></div>
                    <div className="form-group"><label>Model</label><input value={vehForm.model} onChange={e => setVehForm({...vehForm, model: e.target.value})} placeholder="389" /></div>
                    <div className="form-group"><label>Submodel / Trim</label><input value={vehForm.submodel} onChange={e => setVehForm({...vehForm, submodel: e.target.value})} /></div>
                    <div className="form-group"><label>VIN</label><input value={vehForm.vin} onChange={e => setVehForm({...vehForm, vin: e.target.value})} placeholder="17-digit VIN" /></div>
                    <div className="form-group"><label>Color</label><input value={vehForm.color} onChange={e => setVehForm({...vehForm, color: e.target.value})} /></div>
                    <div className="form-group"><label>License Plate</label><input value={vehForm.license_plate} onChange={e => setVehForm({...vehForm, license_plate: e.target.value})} /></div>
                    <div className="form-group"><label>License State</label><input value={vehForm.license_state} onChange={e => setVehForm({...vehForm, license_state: e.target.value})} maxLength="2" placeholder="CA" /></div>
                    <div className="form-group">
                        <label>Mileage</label>
                        <div style={{display:'flex', gap:8, alignItems:'center'}}>
                            <input type="number" value={vehForm.mileage_unknown ? '' : vehForm.mileage}
                                   disabled={!!vehForm.mileage_unknown}

                                   onChange={e => setVehForm({...vehForm, mileage: e.target.value})}
                                   style={{flex:1}} />
                            <label style={{display:'flex', alignItems:'center', gap:4, fontSize:13, whiteSpace:'nowrap', margin:0, cursor:'pointer'}}>
                                <input type="checkbox" checked={!!vehForm.mileage_unknown}

                            </label>
                        </div>
                    </div>
                </div>
                <div className="form-group" style={{marginTop:12}}><label>Notes</label><textarea value={vehForm.notes} onChange={e => setVehForm({...vehForm, notes: e.target.value})} /></div>

            </Modal>
        </div>
    );
}

// VEHICLE DETAIL
// ═══════════════════════════════════════════════════════════
function VehicleDetail({ id, navigate }) {
    const [v, setV] = useState(null);
    const [editing, setEditing] = useState(false);
    const [form, setForm] = useState({});
    const [customers, setCustomers] = useState([]);
    const [custSearch, setCustSearch] = useState('');

    const load = () => api(`/vehicles/${id}`).then(data => {
        setV(data);
        // Pre-check the Unknown box if the saved record has no mileage
        setForm({...data, mileage_unknown: data.mileage == null});
    });
    useEffect(() => { load(); }, [id]);
    useEffect(() => { if (editing) api('/customers').then(setCustomers).catch(() => setCustomers([])); }, [editing]);

    const save = async () => {
        if (!form.customer_id) { alert('Please select an owner'); return; }
        const body = {
            customer_id: parseInt(form.customer_id),
            vin: form.vin || null, year: form.year ? parseInt(form.year) : null,
            make: form.make || null, model: form.model || null, submodel: form.submodel || null,
            color: form.color || null, license_plate: form.license_plate || null,
            license_state: form.license_state || null,
            mileage: (form.mileage_unknown || !form.mileage) ? null : parseInt(form.mileage),
            notes: form.notes || null
        };
        await api(`/vehicles/${id}`, { method: 'PUT', body });
        setEditing(false); load();
    };

    const filteredCustomers = customers.filter(c => {
        if (!custSearch) return true;
        const q = custSearch.toLowerCase();
        return (c.first_name||'').toLowerCase().includes(q)
            || (c.last_name||'').toLowerCase().includes(q)
            || (c.company_name||'').toLowerCase().includes(q);
    });

    if (!v) return <div className="empty-state"><i className="fas fa-spinner fa-spin"></i></div>;

    return (
        <div>
            <div className="page-header">
                <div className="flex items-center gap-2">
                    <button className="btn btn-outline btn-sm" onClick={() => navigate('vehicles')}><i className="fas fa-arrow-left"></i></button>
                    <h2>{vehDesc(v)}</h2>
                </div>
                <button className="btn btn-primary" onClick={() => setEditing(true)}><i className="fas fa-edit"></i> Edit</button>
            </div>
            <div className="detail-grid">
                <div className="card">
                    <div className="section-title"><i className="fas fa-car"></i> Vehicle Info</div>
                    <div className="detail-row"><span className="detail-label">Year</span><span className="detail-value">{v.year||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Make</span><span className="detail-value">{v.make||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Model</span><span className="detail-value">{v.model||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Submodel</span><span className="detail-value">{v.submodel||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Color</span><span className="detail-value">{v.color||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">VIN</span><span className="detail-value">{v.vin||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Plate</span><span className="detail-value">{v.license_plate ? `${v.license_plate} (${v.license_state||'—'})` : '—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Mileage</span><span className="detail-value">{v.mileage ? v.mileage.toLocaleString() : <span className="text-muted">Unknown</span>}</span></div>
                </div>
                <div className="card">
                    <div className="section-title"><i className="fas fa-user"></i> Owner</div>
                    <div className="detail-row clickable" onClick={() => navigate('customer-detail', v.customer_id)}>
                        <span className="detail-value">{custName(v)}</span>
                        <span className="text-muted text-sm">{v.phone_home||''}</span>
                    </div>
                    {v.notes && <>
                        <div className="section-title" style={{marginTop:16}}><i className="fas fa-sticky-note"></i> Notes</div>
                        <div className="text-muted" style={{fontSize:13,whiteSpace:'pre-wrap'}}>{v.notes}</div>
                    </>}
                </div>
            </div>
            <Modal open={editing} onClose={() => setEditing(false)} title="Edit Vehicle">
                <div className="form-group" style={{marginBottom:12}}>
                    <label>Owner <span style={{color:'var(--danger)'}}>*</span></label>
                    <input placeholder="Search customers…" value={custSearch} onChange={e => setCustSearch(e.target.value)} style={{marginBottom:4}} />
                    <select value={form.customer_id||''} onChange={e => setForm({...form, customer_id: e.target.value})}>
                        <option value="">— Select owner —</option>
                        {filteredCustomers.map(c => (
                            <option key={c.id} value={c.id}>
                                {c.company_name || [c.first_name, c.last_name].filter(Boolean).join(' ') || `Customer #${c.id}`}
                            </option>
                        ))}
                    </select>
                    <div className="text-muted text-sm" style={{marginTop:4}}>Change this to reassign the vehicle to a different customer.</div>
                </div>
                <div className="form-grid">
                    <div className="form-group"><label>Year</label><input type="number" value={form.year||''} onChange={e => setForm({...form, year: e.target.value})} /></div>
                    <div className="form-group"><label>Make</label><input value={form.make||''} onChange={e => setForm({...form, make: e.target.value})} /></div>
                    <div className="form-group"><label>Model</label><input value={form.model||''} onChange={e => setForm({...form, model: e.target.value})} /></div>
                    <div className="form-group"><label>Submodel</label><input value={form.submodel||''} onChange={e => setForm({...form, submodel: e.target.value})} /></div>
                    <div className="form-group"><label>VIN</label><input value={form.vin||''} onChange={e => setForm({...form, vin: e.target.value})} /></div>
                    <div className="form-group"><label>Color</label><input value={form.color||''} onChange={e => setForm({...form, color: e.target.value})} /></div>
                    <div className="form-group"><label>License Plate</label><input value={form.license_plate||''} onChange={e => setForm({...form, license_plate: e.target.value})} /></div>
                    <div className="form-group"><label>License State</label><input value={form.license_state||''} onChange={e => setForm({...form, license_state: e.target.value})} maxLength="2" /></div>
                    <div className="form-group">
                        <label>Mileage</label>
                        <div style={{display:'flex', gap:8, alignItems:'center'}}>
                            <input type="number" value={form.mileage_unknown ? '' : (form.mileage||'')}
                                   disabled={!!form.mileage_unknown}
                                   placeholder={form.mileage_unknown ? 'Unknown' : ''}
                                   onChange={e => setForm({...form, mileage: e.target.value})}
                                   style={{flex:1}} />
                            <label style={{display:'flex', alignItems:'center', gap:4, fontSize:13, whiteSpace:'nowrap', margin:0, cursor:'pointer'}}>
                                <input type="checkbox" checked={!!form.mileage_unknown}
                                       onChange={e => setForm({...form, mileage_unknown: e.target.checked, mileage: e.target.checked ? '' : form.mileage})} />
                                Unknown
                            </label>
                        </div>
                    </div>
                </div>
                <div className="form-group" style={{marginTop:12}}><label>Notes</label><textarea value={form.notes||''} onChange={e => setForm({...form, notes: e.target.value})} /></div>
                <div className="modal-actions"><button className="btn btn-outline" onClick={() => setEditing(false)}>Cancel</button><button className="btn btn-primary" onClick={save}><i className="fas fa-save"></i> Save</button></div>
            </Modal>
        </div>
    );
}

// NEW ESTIMATE FORM
// ═══════════════════════════════════════════════════════════
function NewEstimate({ navigate }) {
    const [customers, setCustomers] = useState([]);
    const [vehicles, setVehicles] = useState([]);
    const [insurance, setInsurance] = useState([]);
    const [employees, setEmployees] = useState([]);
    const [form, setForm] = useState({
        customer_id: '', vehicle_id: '', insurance_company_id: '', estimator_id: '',
        claim_number: '', policy_number: '', deductible: '', loss_date: '',
        point_of_impact: '', damage_description: '', notes: '', status: 'pending'
    });
    const [isInsurance, setIsInsurance] = useState(false);
    const [saving, setSaving] = useState(false);
    const [error, setError] = useState('');

    useEffect(() => {
        api('/customers').then(setCustomers).catch(() => {});
        api('/insurance-companies').then(setInsurance).catch(() => {});
        api('/employees').then(setEmployees).catch(() => {});
    }, []);

    // Load vehicles when customer changes
    useEffect(() => {
        if (form.customer_id) {
            api('/vehicles?customer_id=' + form.customer_id).then(setVehicles).catch(() => setVehicles([]));
        } else {
            setVehicles([]);
        }
    }, [form.customer_id]);

    const set = (field, val) => setForm(prev => ({...prev, [field]: val}));

    const handleSubmit = async (e) => {
        e.preventDefault();
        if (!form.customer_id) { setError('Please select a customer'); return; }
        setError('');
        setSaving(true);
        try {
            const body = {
                customer_id: parseInt(form.customer_id),
                vehicle_id: form.vehicle_id ? parseInt(form.vehicle_id) : null,
                insurance_company_id: form.insurance_company_id ? parseInt(form.insurance_company_id) : null,
                estimator_id: form.estimator_id ? parseInt(form.estimator_id) : null,
                claim_number: form.claim_number || null,
                policy_number: form.policy_number || null,
                deductible: form.deductible ? parseFloat(form.deductible) : 0,
                loss_date: form.loss_date || null,
                point_of_impact: form.point_of_impact || null,
                damage_description: form.damage_description || null,
                notes: form.notes || null,
                status: form.status,
            };
            const result = await api('/estimates', { method: 'POST', body });
            navigate('est-detail', result.id);
        } catch (err) {
            setError(err.message || 'Failed to create estimate');
        }
        setSaving(false);
    };

    return (
        <div>
            <div className="page-header">
                <div className="flex items-center gap-2">
                    <button className="btn btn-outline btn-sm" onClick={() => navigate('estimates')}><i className="fas fa-arrow-left"></i></button>
                    <h2>New Estimate</h2>
                </div>
            </div>

            <form onSubmit={handleSubmit}>
                <div className="detail-grid">
                    <div className="card">
                        <div className="section-title"><i className="fas fa-user"></i> Customer & Vehicle</div>
                        <div className="form-group">
                            <label>Customer *</label>
                            <select value={form.customer_id} onChange={e => set('customer_id', e.target.value)} required>
                                <option value="">Select Customer...</option>
                                {customers.map(c => <option key={c.id} value={c.id}>{custName(c)}</option>)}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Vehicle</label>
                            <select value={form.vehicle_id} onChange={e => set('vehicle_id', e.target.value)}>
                                <option value="">Select Vehicle...</option>
                                {vehicles.map(v => <option key={v.id} value={v.id}>{vehDesc(v)}</option>)}
                            </select>
                        </div>
                        <div className="form-group">
                            <label>Estimator</label>
                            <select value={form.estimator_id} onChange={e => set('estimator_id', e.target.value)}>
                                <option value="">Select Estimator...</option>
                                {employees.map(emp => <option key={emp.id} value={emp.id}>{emp.first_name} {emp.last_name}</option>)}
                            </select>
                        </div>
                    </div>

                    <div className="card">
                        <label style={{display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', padding: '4px 0'}}>
                            <input type="checkbox" checked={isInsurance} onChange={e => setIsInsurance(e.target.checked)}
                                   style={{width: 18, height: 18, accentColor: 'var(--primary)'}} />
                            <span style={{fontSize: 15, fontWeight: 600}}><i className="fas fa-shield-halved" style={{marginRight: 6}}></i> Insurance Job</span>
                        </label>
                        {isInsurance && <>
                            <div className="form-group" style={{marginTop: 12}}>
                                <label>Insurance Company</label>
                                <select value={form.insurance_company_id} onChange={e => set('insurance_company_id', e.target.value)}>
                                    <option value="">Select Insurance...</option>
                                    {insurance.map(i => <option key={i.id} value={i.id}>{i.company_name}</option>)}
                                </select>
                            </div>
                            <div className="form-group">
                                <label>Claim Number</label>
                                <input value={form.claim_number} onChange={e => set('claim_number', e.target.value)} placeholder="Claim #" />
                            </div>
                            <div className="form-group">
                                <label>Policy Number</label>
                                <input value={form.policy_number} onChange={e => set('policy_number', e.target.value)} placeholder="Policy #" />
                            </div>
                            <div className="form-group">
                                <label>Deductible</label>
                                <input type="number" step="0.01" value={form.deductible} onChange={e => set('deductible', e.target.value)} placeholder="0.00" />
                            </div>
                        </>}
                    </div>
                </div>

                <div className="card mt-4">
                    <div className="section-title"><i className="fas fa-clipboard"></i> Job Details</div>
                    <div className="detail-grid">
                        {isInsurance && <div className="form-group">
                            <label>Loss Date</label>
                            <input type="date" value={form.loss_date} onChange={e => set('loss_date', e.target.value)} />
                        </div>}
                        <div className="form-group">
                            <label>Area</label>
                            <input value={form.point_of_impact} onChange={e => set('point_of_impact', e.target.value)} placeholder="e.g. Full body, Hood & fenders, Left side..." />
                        </div>
                    </div>
                    <div className="form-group">
                        <label>Job Description</label>
                        <textarea rows={3} value={form.damage_description} onChange={e => set('damage_description', e.target.value)}
                                  placeholder="e.g. Full repaint, rust repair and refinish, collision damage, color change..." style={{width:'100%', padding:10, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', resize:'vertical'}}></textarea>
                    </div>
                    <div className="form-group">
                        <label>Notes</label>
                        <textarea rows={2} value={form.notes} onChange={e => set('notes', e.target.value)}
                                  placeholder="Internal notes..." style={{width:'100%', padding:10, background:'var(--bg-input)', border:'1px solid var(--border)', borderRadius:6, color:'var(--text)', resize:'vertical'}}></textarea>
                    </div>
                </div>

                {error && <div style={{color: 'var(--red)', marginTop: 12, fontWeight: 600}}><i className="fas fa-exclamation-circle"></i> {error}</div>}

                <div style={{marginTop: 16, display: 'flex', gap: 12}}>
                    <button type="submit" className="btn btn-primary" disabled={saving}>
                        {saving ? <><i className="fas fa-spinner fa-spin"></i> Creating...</> : <><i className="fas fa-save"></i> Create Estimate</>}
                    </button>
                    <button type="button" className="btn btn-outline" onClick={() => navigate('estimates')}>Cancel</button>
                </div>
            </form>
        </div>
    );
}

// PANEL / PART PICKER (searchable catalog from Mitchell data)
// ═══════════════════════════════════════════════════════════
function PanelPicker({ onSelect }) {
    const [open, setOpen] = useState(false);
    const [search, setSearch] = useState('');
    const [activeCat, setActiveCat] = useState('All');

    const catalog = typeof PARTS_CATALOG !== 'undefined' ? PARTS_CATALOG : [];
    const cats = ['All', ...Array.from(new Set(catalog.map(p => p.cat)))];

    const filtered = catalog.filter(p => {
        const matchCat = activeCat === 'All' || p.cat === activeCat;
        const matchSearch = !search || p.name.toLowerCase().includes(search.toLowerCase());
        return matchCat && matchSearch;
    });

    const handleSelect = (item) => {
        onSelect(item);
        setOpen(false);
        setSearch('');
    };

    if (!open) {
        return (
            <div style={{marginBottom: 12}}>
                <button className="btn btn-outline" onClick={() => setOpen(true)} style={{width: '100%', justifyContent: 'center', padding: '10px 16px'}}>
                    <i className="fas fa-search"></i> Pick Panel / Part from Catalog
                </button>
            </div>
        );
    }

    return (
        <div style={{marginBottom: 12, border: '1px solid var(--primary)', borderRadius: 8, overflow: 'hidden'}}>
            {/* Search bar */}
            <div style={{padding: '10px 12px', background: 'var(--bg-card)', borderBottom: '1px solid var(--border)', display: 'flex', gap: 8, alignItems: 'center'}}>
                <i className="fas fa-search" style={{color: 'var(--text-muted)'}}></i>
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search panels & parts..."
                       autoFocus style={{flex: 1, background: 'var(--bg-input)', border: '1px solid var(--border)', borderRadius: 6, padding: '8px 10px', color: 'var(--text)'}} />
                <button className="btn btn-outline btn-sm" onClick={() => { setOpen(false); setSearch(''); }}>
                    <i className="fas fa-times"></i>
                </button>
            </div>

            {/* Category tabs */}
            <div style={{display: 'flex', gap: 0, overflowX: 'auto', background: 'var(--bg-card)', borderBottom: '1px solid var(--border)', padding: '0 4px'}}>
                {cats.map(c => (
                    <button key={c} onClick={() => setActiveCat(c)}
                        style={{padding: '8px 14px', fontSize: 12, fontWeight: activeCat === c ? 700 : 400, whiteSpace: 'nowrap',
                            background: 'transparent', border: 'none', borderBottom: activeCat === c ? '2px solid var(--primary)' : '2px solid transparent',
                            color: activeCat === c ? 'var(--primary)' : 'var(--text-muted)', cursor: 'pointer'}}>
                        {c}
                    </button>
                ))}
            </div>

            {/* Results */}
            <div style={{maxHeight: 280, overflowY: 'auto', padding: 4}}>
                {filtered.length === 0 && <div style={{padding: 20, textAlign: 'center', color: 'var(--text-muted)'}}>No parts found</div>}
                {filtered.map((p, i) => (
                    <div key={i} className="picker-row" onClick={() => handleSelect(p)}
                         style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '8px 12px', cursor: 'pointer',
                             borderRadius: 6, fontSize: 13, borderBottom: '1px solid var(--border)'}}>
                        <div>
                            <span style={{fontWeight: 600, color: 'var(--text)'}}>{p.name}</span>
                            <span style={{marginLeft: 8, fontSize: 11, color: 'var(--text-muted)'}}>{p.cat}</span>
                        </div>
                        <span className="badge" style={{fontSize: 11, padding: '2px 8px',
                            background: p.op === 'refinish' ? 'rgba(234,179,8,0.15)' : p.op === 'replace' ? 'rgba(59,130,246,0.15)' : 'rgba(168,85,247,0.15)',
                            color: p.op === 'refinish' ? '#eab308' : p.op === 'replace' ? '#3b82f6' : '#a855f7'}}>
                            {p.op}
                        </span>
                    </div>
                ))}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// ESTIMATE DETAIL (with add/delete line items)
// ═══════════════════════════════════════════════════════════
function EstimateDetail({ id, navigate }) {
    const [est, setEst] = useState(null);
    const [showAddLine, setShowAddLine] = useState(false);
    const [rates, setRates] = useState([]);
    const [lineForm, setLineForm] = useState({ line_type: 'labor', operation: '', description: '', part_number: '', part_type: 'OEM',
        quantity: 1, labor_hours: 0, labor_rate: 0, paint_hours: 0, paint_rate: 0, part_price: 0, part_cost: 0, notes: '' });
    const [lineSaving, setLineSaving] = useState(false);

    const load = () => api(`/estimates/${id}`).then(setEst);
    useEffect(() => { load(); }, [id]);
    useEffect(() => { api('/shop/rates').then(setRates).catch(() => {}); }, []);

    // Auto-fill rate when type changes
    const setLineField = (field, val) => {
        setLineForm(prev => {
            const next = {...prev, [field]: val};
            if (field === 'line_type') {
                const findRate = (keyword) => { const r = rates.find(r => r.rate_type.includes(keyword)); return r ? r.rate_amount : 0; };
                if (val === 'labor') { next.labor_rate = findRate('body_labor') || findRate('labor'); next.paint_rate = 0; next.paint_hours = 0; next.part_price = 0; next.part_cost = 0; next.part_number = ''; }
                else if (val === 'paint' || val === 'refinish') { next.paint_rate = findRate('paint') || findRate('refinish'); next.labor_rate = 0; next.labor_hours = 0; next.part_price = 0; next.part_cost = 0; next.part_number = ''; }
                else if (val === 'part') { next.labor_hours = 0; next.labor_rate = 0; next.paint_hours = 0; next.paint_rate = 0; }
                else { next.labor_hours = 0; next.labor_rate = 0; next.paint_hours = 0; next.paint_rate = 0; next.part_number = ''; }
            }
            return next;
        });
    };

    const addLine = async () => {
        if (!lineForm.description) return;
        setLineSaving(true);
        try {
            const body = {
                line_type: lineForm.line_type,
                operation: lineForm.operation || null,
                description: lineForm.description,
                part_number: lineForm.part_number || null,
                part_type: lineForm.line_type === 'part' ? lineForm.part_type : null,
                quantity: parseFloat(lineForm.quantity) || 1,
                labor_hours: parseFloat(lineForm.labor_hours) || 0,
                labor_rate: parseFloat(lineForm.labor_rate) || 0,
                paint_hours: parseFloat(lineForm.paint_hours) || 0,
                paint_rate: parseFloat(lineForm.paint_rate) || 0,
                part_price: parseFloat(lineForm.part_price) || 0,
                part_cost: parseFloat(lineForm.part_cost) || 0,
                notes: lineForm.notes || null,
            };
            await api(`/estimates/${id}/lines`, { method: 'POST', body });
            setLineForm({ line_type: lineForm.line_type, operation: '', description: '', part_number: '', part_type: 'OEM',
                quantity: 1, labor_hours: 0, labor_rate: body.labor_rate, paint_hours: 0, paint_rate: body.paint_rate, part_price: 0, part_cost: 0, notes: '' });
            load();
        } catch (err) { alert(err.message); }
        setLineSaving(false);
    };

    const deleteLine = async (lineId) => {
        if (!confirm('Delete this line?')) return;
        try {
            await api(`/estimates/${id}/lines/${lineId}`, { method: 'DELETE' });
            load();
        } catch (err) { alert(err.message); }
    };

    const convertToRO = async () => {
        if (!confirm('Convert this estimate to a Repair Order?')) return;
        const res = await api(`/estimates/${id}/convert-to-ro`, { method: 'POST' });
        alert(`Created ${res.ro_number}`);
        navigate('ro-detail', res.id);
    };

    if (!est) return <div className="empty-state"><i className="fas fa-spinner fa-spin"></i></div>;

    const lt = lineForm.line_type;
    const lineTotal = lt === 'part' ? (parseFloat(lineForm.part_price)||0) * (parseFloat(lineForm.quantity)||1)
        : lt === 'labor' ? (parseFloat(lineForm.labor_hours)||0) * (parseFloat(lineForm.labor_rate)||0)
        : (lt === 'paint' || lt === 'refinish') ? (parseFloat(lineForm.paint_hours)||0) * (parseFloat(lineForm.paint_rate)||0)
        : (parseFloat(lineForm.part_price)||0);

    return (
        <div>
            <div className="page-header">
                <div className="flex items-center gap-2">
                    <button className="btn btn-outline btn-sm" onClick={() => navigate('estimates')}><i className="fas fa-arrow-left"></i></button>
                    <h2>{est.estimate_number}</h2>
                    <Badge status={est.status} />
                </div>
                <div className="flex gap-2">
                    <a href={`${API}/exports/estimate/${id}/pdf`} target="_blank" className="btn btn-outline"><i className="fas fa-file-pdf"></i> Print PDF</a>
                    {est.status !== 'converted' && (
                        <button className="btn btn-success" onClick={convertToRO}><i className="fas fa-arrow-right"></i> Convert to RO</button>
                    )}
                </div>
            </div>

            <div className="detail-grid">
                <div className="card">
                    <div className="section-title"><i className="fas fa-user"></i> Customer & Vehicle</div>
                    <div className="detail-row"><span className="detail-label">Customer</span><span className="detail-value">{custName(est)}</span></div>
                    <div className="detail-row"><span className="detail-label">Vehicle</span><span className="detail-value">{vehDesc(est)}</span></div>
                    <div className="detail-row"><span className="detail-label">VIN</span><span className="detail-value">{est.vin||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Color</span><span className="detail-value">{est.vehicle_color||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Mileage</span><span className="detail-value">{est.mileage ? est.mileage.toLocaleString() : <span className="text-muted">Unknown</span>}</span></div>
                </div>
                <div className="card">
                    <div className="detail-row"><span className="detail-label">Estimator</span><span className="detail-value">{[est.estimator_first, est.estimator_last].filter(Boolean).join(' ')||'—'}</span></div>
                    {(est.insurance_name || est.claim_number || est.deductible > 0) ? <>
                        <div style={{marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)'}}>
                            <div className="section-title"><i className="fas fa-shield-halved"></i> Insurance</div>
                        </div>
                        <div className="detail-row"><span className="detail-label">Insurance</span><span className="detail-value">{est.insurance_name||'—'}</span></div>
                        <div className="detail-row"><span className="detail-label">Claim #</span><span className="detail-value">{est.claim_number||'—'}</span></div>
                        <div className="detail-row"><span className="detail-label">Deductible</span><span className="detail-value money">{fmt(est.deductible)}</span></div>
                        <div className="detail-row"><span className="detail-label">Loss Date</span><span className="detail-value">{fmtDate(est.loss_date)}</span></div>
                    </> : (
                        <div className="detail-row" style={{marginTop: 8}}><span className="detail-label">Type</span><span className="detail-value">Customer Pay</span></div>
                    )}
                </div>
            </div>

            {est.damage_description && (
                <div className="card mt-4">
                    <div className="section-title"><i className="fas fa-clipboard"></i> Job Description</div>
                    <p>{est.damage_description}</p>
                </div>
            )}

            {/* ── Line Items Table ── */}
            <div className="card mt-4">
                <div className="card-header" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                    <h3>Line Items ({(est.lines||[]).length})</h3>
                    {est.status !== 'converted' && (
                        <button className="btn btn-primary btn-sm" onClick={() => setShowAddLine(!showAddLine)}>
                            <i className={`fas fa-${showAddLine ? 'times' : 'plus'}`}></i> {showAddLine ? 'Cancel' : 'Add Line'}
                        </button>
                    )}
                </div>

                {/* ── Add Line Form ── */}
                {showAddLine && (
                    <div style={{padding: 16, background: 'var(--bg)', borderRadius: 8, margin: '12px 0', border: '1px solid var(--border)'}}>

                        {/* Panel/Part Picker */}
                        <PanelPicker onSelect={(item) => {
                            const opMap = { 'refinish': 'paint', 'replace': 'part', 'R&I': 'labor' };
                            const newType = opMap[item.op] || 'labor';
                            setLineField('line_type', newType);
                            // Need to set multiple fields at once
                            setLineForm(prev => {
                                const findRate = (keyword) => { const r = rates.find(r => r.rate_type.includes(keyword)); return r ? r.rate_amount : 0; };
                                return {
                                    ...prev,
                                    line_type: newType,
                                    description: item.name,
                                    operation: item.op === 'refinish' ? 'refinish' : item.op === 'R&I' ? 'remove_install' : 'replace',
                                    labor_hours: newType === 'labor' ? prev.labor_hours : 0,
                                    labor_rate: newType === 'labor' ? (findRate('body_labor') || prev.labor_rate) : 0,
                                    paint_hours: newType === 'paint' ? prev.paint_hours : 0,
                                    paint_rate: newType === 'paint' ? (findRate('paint') || prev.paint_rate) : 0,
                                    part_price: newType === 'part' ? prev.part_price : 0,
                                    part_cost: newType === 'part' ? prev.part_cost : 0,
                                    part_number: '',
                                    part_type: 'OEM',
                                    quantity: 1,
                                };
                            });
                        }} />

                        <div style={{display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap'}}>
                            {[{v:'labor',l:'Labor'},{v:'paint',l:'Paint/Refinish'},{v:'part',l:'Parts'},{v:'sublet',l:'Sublet'},{v:'other',l:'Other'}].map(t => (
                                <button key={t.v} className={`btn btn-sm ${lt === t.v ? 'btn-primary' : 'btn-outline'}`}
                                        onClick={() => setLineField('line_type', t.v)}>{t.l}</button>
                            ))}
                        </div>

                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 10}}>
                            <div className="form-group">
                                <label>Operation</label>
                                <select value={lineForm.operation} onChange={e => setLineField('operation', e.target.value)} style={{padding: '8px 10px'}}>
                                    <option value="">Select...</option>
                                    {lt === 'labor' && <>
                                        <option value="repair">Repair</option><option value="replace">Replace</option>
                                        <option value="remove_install">R&I (Remove & Install)</option><option value="overhaul">Overhaul</option>
                                        <option value="straighten">Straighten</option><option value="weld">Weld</option>
                                        <option value="align">Align</option><option value="blend">Blend</option>
                                    </>}
                                    {(lt === 'paint' || lt === 'refinish') && <>
                                        <option value="refinish">Refinish</option><option value="blend">Blend</option>
                                        <option value="two_tone">Two-Tone</option><option value="three_stage">Three-Stage</option>
                                        <option value="clearcoat">Clearcoat</option><option value="undercoat">Undercoat</option>
                                        <option value="bedliner">Bedliner</option><option value="stripe">Stripe/Decal</option>
                                    </>}
                                    {lt === 'part' && <>
                                        <option value="replace">Replace</option><option value="add">Add</option>
                                    </>}
                                    {lt === 'sublet' && <>
                                        <option value="sublet">Sublet</option><option value="tow">Tow</option>
                                        <option value="glass">Glass</option><option value="alignment">Alignment</option>
                                    </>}
                                    {lt === 'other' && <>
                                        <option value="misc">Miscellaneous</option><option value="hazmat">Hazmat/Env Fee</option>
                                        <option value="storage">Storage</option><option value="admin">Admin Fee</option>
                                    </>}
                                </select>
                            </div>

                            <div className="form-group" style={{gridColumn: 'span 2'}}>
                                <label>Description *</label>
                                <input value={lineForm.description} onChange={e => setLineField('description', e.target.value)}
                                       placeholder={lt === 'part' ? 'Part name / description' : lt === 'paint' ? 'Panel or area' : 'Description of work'} />
                            </div>

                            {lt === 'part' && <>
                                <div className="form-group">
                                    <label>Part Number</label>
                                    <input value={lineForm.part_number} onChange={e => setLineField('part_number', e.target.value)} placeholder="Part #" />
                                </div>
                                <div className="form-group">
                                    <label>Part Type</label>
                                    <select value={lineForm.part_type} onChange={e => setLineField('part_type', e.target.value)}>
                                        <option value="OEM">OEM (New)</option>
                                        <option value="aftermarket">Aftermarket</option>
                                        <option value="used">Used/Recycled</option>
                                        <option value="reconditioned">Reconditioned</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label>Quantity</label>
                                    <input type="number" min="1" step="1" value={lineForm.quantity} onChange={e => setLineField('quantity', e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label>Price (each)</label>
                                    <input type="number" step="0.01" value={lineForm.part_price} onChange={e => setLineField('part_price', e.target.value)} placeholder="0.00" />
                                </div>
                                <div className="form-group">
                                    <label>Cost (each)</label>
                                    <input type="number" step="0.01" value={lineForm.part_cost} onChange={e => setLineField('part_cost', e.target.value)} placeholder="0.00" />
                                </div>
                            </>}

                            {lt === 'labor' && <>
                                <div className="form-group">
                                    <label>Hours</label>
                                    <input type="number" step="0.1" value={lineForm.labor_hours} onChange={e => setLineField('labor_hours', e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label>Rate ($/hr)</label>
                                    <input type="number" step="0.01" value={lineForm.labor_rate} onChange={e => setLineField('labor_rate', e.target.value)} />
                                </div>
                            </>}

                            {(lt === 'paint' || lt === 'refinish') && <>
                                <div className="form-group">
                                    <label>Paint Hours</label>
                                    <input type="number" step="0.1" value={lineForm.paint_hours} onChange={e => setLineField('paint_hours', e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label>Paint Rate ($/hr)</label>
                                    <input type="number" step="0.01" value={lineForm.paint_rate} onChange={e => setLineField('paint_rate', e.target.value)} />
                                </div>
                            </>}

                            {(lt === 'sublet' || lt === 'other') && <>
                                <div className="form-group">
                                    <label>Amount</label>
                                    <input type="number" step="0.01" value={lineForm.part_price} onChange={e => setLineField('part_price', e.target.value)} placeholder="0.00" />
                                </div>
                            </>}
                        </div>

                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginTop: 12, paddingTop: 12, borderTop: '1px solid var(--border)'}}>
                            <div style={{fontSize: 15, fontWeight: 600}}>
                                Line Total: <span style={{color:'var(--primary)', fontSize: 17}}>{fmt(lineTotal)}</span>
                            </div>
                            <button className="btn btn-primary" onClick={addLine} disabled={lineSaving || !lineForm.description}>
                                {lineSaving ? <><i className="fas fa-spinner fa-spin"></i> Adding...</> : <><i className="fas fa-plus"></i> Add Line</>}
                            </button>
                        </div>
                    </div>
                )}

                <div className="table-wrapper">
                    <table><thead><tr><th>#</th><th>Type</th><th>Operation</th><th>Description</th><th>Part #</th><th>Hours</th><th>Rate</th><th>Parts $</th><th>Total</th>{est.status !== 'converted' && <th></th>}</tr></thead>
                    <tbody>
                    {(est.lines||[]).length === 0 && (
                        <tr><td colSpan={est.status !== 'converted' ? 10 : 9} style={{textAlign:'center', color:'var(--text-muted)', padding: 24}}>
                            No line items yet — click "Add Line" to start building the estimate
                        </td></tr>
                    )}
                    {(est.lines||[]).map(l => (
                        <tr key={l.id}>
                            <td>{l.line_number}</td>
                            <td><Badge status={l.line_type} /></td>
                            <td>{l.operation||'—'}</td>
                            <td>{l.description}</td>
                            <td className="text-sm">{l.part_number||'—'}</td>
                            <td>{l.labor_hours || l.paint_hours || '—'}</td>
                            <td>{l.labor_rate || l.paint_rate || '—'}</td>
                            <td className="money">{l.part_price ? fmt(l.part_price * (l.quantity||1)) : '—'}</td>
                            <td className="money" style={{fontWeight:600}}>{fmt(l.line_total)}</td>
                            {est.status !== 'converted' && (
                                <td><button className="btn btn-outline btn-sm" style={{color:'var(--red)', borderColor:'var(--red)', padding:'4px 8px'}}
                                        onClick={() => deleteLine(l.id)} title="Delete line"><i className="fas fa-trash"></i></button></td>
                            )}
                        </tr>
                    ))}
                    </tbody></table>
                </div>
                <div style={{display:'flex', justifyContent:'flex-end', marginTop:16}}>
                    <div style={{width:280}}>
                        <div className="detail-row"><span className="detail-label">Labor</span><span className="detail-value money">{fmt(est.subtotal_labor)}</span></div>
                        <div className="detail-row"><span className="detail-label">Parts</span><span className="detail-value money">{fmt(est.subtotal_parts)}</span></div>
                        <div className="detail-row"><span className="detail-label">Paint</span><span className="detail-value money">{fmt(est.subtotal_paint)}</span></div>
                        <div className="detail-row"><span className="detail-label">Tax</span><span className="detail-value money">{fmt(est.tax_amount)}</span></div>
                        <div className="detail-row" style={{borderTop:'2px solid var(--primary)', paddingTop:8}}>
                            <span className="detail-label" style={{fontWeight:700,fontSize:15}}>Total</span>
                            <span className="detail-value money" style={{fontSize:18,color:'var(--primary)'}}>{fmt(est.total_amount)}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    );
}

// REPAIR ORDERS LIST
// ═══════════════════════════════════════════════════════════
function RepairOrdersPage({ navigate }) {
    const [ros, setRos] = useState([]);
    const [search, setSearch] = useState('');
    const [statusFilter, setStatusFilter] = useState('');

    useEffect(() => {
        let q = '/repair-orders?';
        if (search) q += `search=${search}&`;
        if (statusFilter) q += `status=${statusFilter}`;
        api(q).then(setRos);
    }, [search, statusFilter]);

    return (
        <div>
            <div className="page-header"><h2>Repair Orders</h2></div>
            <div className="search-bar">
                <input placeholder="Search RO #, customer, VIN, claim..." value={search} onChange={e => setSearch(e.target.value)} />
                <select value={statusFilter} onChange={e => setStatusFilter(e.target.value)} style={{width:160}}>
                    <option value="">All Statuses</option>
                    <option value="open">Open</option><option value="in_progress">In Progress</option>
                    <option value="on_hold">On Hold</option><option value="completed">Completed</option>
                    <option value="delivered">Delivered</option><option value="closed">Closed</option>
                </select>
            </div>
            <div className="card"><div className="table-wrapper">
                <table><thead><tr><th>RO #</th><th>Customer</th><th>Vehicle</th><th>Status</th><th>Priority</th><th>Target Date</th><th>Total</th><th>Balance</th></tr></thead>
                <tbody>
                {ros.map(r => (
                    <tr key={r.id} className="clickable" onClick={() => navigate('ro-detail', r.id)}>
                        <td style={{color:'var(--primary)', fontWeight:600}}>{r.ro_number}</td>
                        <td>{custName(r)}</td>
                        <td>{vehDesc(r)}</td>
                        <td><Badge status={r.status} /></td>
                        <td><Badge status={r.priority} /></td>
                        <td>{fmtDate(r.target_delivery_date)}</td>

                    </tr>
                ))}
                </tbody></table>
            </div></div>
        </div>
    );
}
