// REPAIR ORDER DETAIL
// ═══════════════════════════════════════════════════════════
function RODetail({ id, navigate }) {
    const [ro, setRo] = useState(null);
    const [tab, setTab] = useState('lines');
    const [showPayment, setShowPayment] = useState(false);
    const [payForm, setPayForm] = useState({amount:'',payment_method:'insurance',reference_number:'',payer_name:''});

    const load = () => api(`/repair-orders/${id}`).then(setRo);
    useEffect(() => { load(); }, [id]);
    if (!ro) return <div className="empty-state"><i className="fas fa-spinner fa-spin"></i></div>;

    const addPayment = async () => {
        await api(`/repair-orders/${id}/payments`, { method: 'POST', body: { ...payForm, amount: parseFloat(payForm.amount) } });
        setShowPayment(false);
        setPayForm({amount:'',payment_method:'insurance',reference_number:'',payer_name:''});
        load();
    };

    return (
        <div>
            <div className="page-header">
                <div className="flex items-center gap-2">
                    <button className="btn btn-outline btn-sm" onClick={() => navigate('repair-orders')}><i className="fas fa-arrow-left"></i></button>
                    <h2>{ro.ro_number}</h2>
                    <Badge status={ro.status} />
                    <Badge status={ro.priority} />
                </div>
                <div className="flex gap-2">
                    <a href={`${API}/exports/ro/${id}/invoice-pdf`} target="_blank" className="btn btn-primary"><i className="fas fa-file-invoice"></i> Invoice PDF</a>
                    <a href={`${API}/exports/ro/${id}/work-order-pdf`} target="_blank" className="btn btn-outline"><i className="fas fa-clipboard-list"></i> Work Order</a>
                </div>
            </div>

            <div className="detail-grid">
                <div className="card">
                    <div className="section-title"><i className="fas fa-user"></i> Customer & Vehicle</div>
                    <div className="detail-row"><span className="detail-label">Customer</span><span className="detail-value clickable" style={{color:'var(--primary)'}} onClick={() => navigate('customer-detail', ro.customer_id)}>{custName(ro)}</span></div>
                    <div className="detail-row"><span className="detail-label">Phone</span><span className="detail-value">{ro.customer_phone||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Vehicle</span><span className="detail-value">{vehDesc(ro)}</span></div>
                    <div className="detail-row"><span className="detail-label">VIN</span><span className="detail-value">{ro.vin||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Color</span><span className="detail-value">{ro.vehicle_color||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">License</span><span className="detail-value">{ro.license_plate||'—'}</span></div>
                </div>
                <div className="card">
                    <div className="section-title"><i className="fas fa-shield-halved"></i> Insurance & Assignment</div>
                    <div className="detail-row"><span className="detail-label">Insurance</span><span className="detail-value">{ro.insurance_name||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Claim #</span><span className="detail-value">{ro.claim_number||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Deductible</span><span className="detail-value money">{fmt(ro.deductible)}</span></div>
                    <div className="detail-row"><span className="detail-label">Estimator</span><span className="detail-value">{[ro.estimator_first, ro.estimator_last].filter(Boolean).join(' ')||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Technician</span><span className="detail-value">{[ro.tech_first, ro.tech_last].filter(Boolean).join(' ')||'—'}</span></div>
                    <div className="detail-row"><span className="detail-label">Painter</span><span className="detail-value">{[ro.painter_first, ro.painter_last].filter(Boolean).join(' ')||'—'}</span></div>
                </div>
            </div>

            {/* Dates */}
            <div className="card mt-4">
                <div className="section-title"><i className="fas fa-calendar"></i> Key Dates</div>
                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(200px,1fr))', gap:8}}>
                    {[['Loss Date', ro.loss_date],['Scheduled In', ro.scheduled_in_date],['Vehicle Arrived', ro.vehicle_arrived_date],
                      ['Repair Started', ro.repair_start_date],['Target Delivery', ro.target_delivery_date],['Completed', ro.actual_complete_date],
                      ['Customer Notified', ro.notify_customer_date],['Delivered', ro.delivered_date]].map(([lbl,val]) => (
                        <div key={lbl} className="detail-row"><span className="detail-label">{lbl}</span><span className="detail-value">{fmtDate(val)}</span></div>
                    ))}
                </div>
            </div>

            {/* Tabs */}
            <div className="tabs mt-4">
                {[['lines','Line Items'],['payments','Payments'],['timecards','Time Cards']].map(([k,l]) => (
                    <div key={k} className={`tab ${tab===k?'active':''}`} onClick={() => setTab(k)}>{l}</div>
                ))}
            </div>

            {tab === 'lines' && (
                <div className="card">
                    <div className="table-wrapper">
                        <table><thead><tr><th>#</th><th>Type</th><th>Op</th><th>Description</th><th>Part #</th><th>Qty</th><th>Hours</th><th>Rate</th><th>Parts $</th><th>Status</th><th>Total</th></tr></thead>

                        {(ro.lines||[]).map(l => (
                            <tr key={l.id}>

                                <td>{l.description}</td><td className="text-sm">{l.part_number||'—'}</td>
                                <td>{l.quantity}</td><td>{l.labor_hours||l.paint_hours||'—'}</td><td>{l.labor_rate||l.paint_rate||'—'}</td>
                                <td className="money">{l.part_price ? fmt(l.part_price):'—'}</td>

                                <td className="money" style={{fontWeight:600}}>{fmt(l.line_total)}</td>
                            </tr>
                        ))}
                        </tbody></table>
                    </div>
                    <div style={{display:'flex', justifyContent:'flex-end', marginTop:16}}>
                        <div style={{width:300}}>

                            <div className="detail-row"><span className="detail-label">Parts</span><span className="detail-value money">{fmt(ro.subtotal_parts)}</span></div>
                            <div className="detail-row"><span className="detail-label">Paint</span><span className="detail-value money">{fmt(ro.subtotal_paint)}</span></div>
                            <div className="detail-row"><span className="detail-label">Tax</span><span className="detail-value money">{fmt(ro.tax_amount)}</span></div>
                            <div className="detail-row" style={{borderTop:'2px solid var(--border)'}}><span className="detail-label" style={{fontWeight:700}}>Total</span><span className="detail-value money" style={{fontSize:16}}>{fmt(ro.total_amount)}</span></div>
                            <div className="detail-row"><span className="detail-label">Paid</span><span className="detail-value money text-green">{fmt(ro.amount_paid)}</span></div>
                            <div className="detail-row" style={{borderTop:'2px solid var(--primary)'}}><span className="detail-label" style={{fontWeight:700,fontSize:15}}>Balance Due</span><span className="detail-value money" style={{fontSize:18,color: ro.balance_due > 0 ? 'var(--red)':'var(--green)'}}>{fmt(ro.balance_due)}</span></div>

                </div>

            {tab === 'payments' && (
                <div className="card">

                    <tbody>

                        <tr key={p.id}>

                            <td>{(p.payment_method||'').replace(/_/g,' ')}</td><td>{p.reference_number||'—'}</td><td>{p.payer_name||'—'}</td>

                    </tbody></table>
                </div>
            )}

            {tab === 'timecards' && (
                <div className="card">
                    <div className="card-header"><h3>Time Cards</h3></div>
                    <table><thead><tr><th>Employee</th><th>Clock In</th><th>Clock Out</th><th>Hours</th><th>Type</th></tr></thead>
                    <tbody>
                    {(ro.time_cards||[]).map(t => (
                        <tr key={t.id}>
                            <td>{[t.first_name, t.last_name].filter(Boolean).join(' ')}</td>
                            <td>{t.clock_in}</td><td>{t.clock_out||'—'}</td>
                            <td>{t.hours_worked}</td><td>{t.activity_type}</td>
                        </tr>
                    ))}
                    {!(ro.time_cards||[]).length && <tr><td colSpan="5" className="text-muted" style={{textAlign:'center',padding:24}}>No time cards</td></tr>}
                    </tbody></table>
                </div>
            )}

            <Modal open={showPayment} onClose={() => setShowPayment(false)} title="Record Payment">
                <div className="form-grid">
                    <div className="form-group"><label>Amount</label><input type="number" step="0.01" value={payForm.amount} onChange={e => setPayForm({...payForm, amount: e.target.value})} /></div>
                    <div className="form-group"><label>Method</label>
                        <select value={payForm.payment_method} onChange={e => setPayForm({...payForm, payment_method: e.target.value})}>
                            <option value="insurance">Insurance</option><option value="check">Check</option>
                            <option value="cash">Cash</option><option value="credit_card">Credit Card</option>
                            <option value="debit">Debit</option><option value="other">Other</option>
                        </select>
                    </div>
                    <div className="form-group"><label>Reference #</label><input value={payForm.reference_number} onChange={e => setPayForm({...payForm, reference_number: e.target.value})} /></div>
                    <div className="form-group"><label>Payer Name</label><input value={payForm.payer_name} onChange={e => setPayForm({...payForm, payer_name: e.target.value})} /></div>
                </div>
                <div className="modal-actions"><button className="btn btn-outline" onClick={() => setShowPayment(false)}>Cancel</button><button className="btn btn-success" onClick={addPayment}><i className="fas fa-check"></i> Record Payment</button></div>
            </Modal>
        </div>
    );
}

function InsurancePage({ navigate }) {

    const load = () => api('/insurance' + (search ? `?search=${search}` : '')).then(setCompanies);

    return (

        </div>
    );
}

// EMPLOYEES
// ═══════════════════════════════════════════════════════════
function EmployeesPage({ navigate }) {
    const [employees, setEmployees] = useState([]);
    const [showForm, setShowForm] = useState(false);
    const [editId, setEditId] = useState(null);
    const emptyEmp = {employee_code:'',first_name:'',last_name:'',role:'technician',email:'',phone:'',hourly_rate:'',flag_rate:'',hire_date:'',notes:'',is_active:1};
    const [form, setForm] = useState(emptyEmp);

    const load = () => api('/employees').then(setEmployees);
    useEffect(() => { load(); }, []);

    const openNew = () => { setEditId(null); setForm(emptyEmp); setShowForm(true); };
    const openEdit = (emp) => {
        setEditId(emp.id);
        setForm({
            employee_code: emp.employee_code||'', first_name: emp.first_name||'', last_name: emp.last_name||'',
            role: emp.role||'technician', email: emp.email||'', phone: emp.phone||'',
            hourly_rate: emp.hourly_rate||'', flag_rate: emp.flag_rate||'',
            hire_date: emp.hire_date||'', notes: emp.notes||'', is_active: emp.is_active != null ? emp.is_active : 1
        });
        setShowForm(true);
    };

    const save = async () => {
        const body = {...form};
        // Convert blank numeric fields to null (Pydantic rejects empty strings for floats)
        body.hourly_rate = (body.hourly_rate === '' || body.hourly_rate == null) ? null : parseFloat(body.hourly_rate);
        body.flag_rate   = (body.flag_rate   === '' || body.flag_rate   == null) ? null : parseFloat(body.flag_rate);
        // Convert blank optional strings to null
        ['email','phone','hire_date','notes','employee_code'].forEach(k => { if (body[k] === '') body[k] = null; });
        body.is_active = body.is_active ? 1 : 0;
        if (!body.employee_code) body.employee_code = (body.first_name[0]||'')+(body.last_name||'').toUpperCase().slice(0,3)+(Math.floor(Math.random()*90)+10);
        try {
            if (editId) await api(`/employees/${editId}`, { method: 'PUT', body });
            else await api('/employees', { method: 'POST', body });
            setShowForm(false); setEditId(null); setForm(emptyEmp); load();
        } catch (err) {
            alert('Failed to save employee: ' + (err.message || err));
        }
    };

    return (
        <div>
            <div className="page-header">
                <h2>Employees</h2>
                <button className="btn btn-primary" onClick={openNew}><i className="fas fa-plus"></i> New Employee</button>
            </div>
            <div className="card"><div className="table-wrapper">
                <table><thead><tr><th>Code</th><th>Name</th><th>Role</th><th>Hourly Rate</th><th>Flag Rate</th><th>Status</th><th></th></tr></thead>
                <tbody>{employees.map(e => (
                    <tr key={e.id} className="clickable" onClick={() => openEdit(e)}>
                        <td style={{fontWeight:600}}>{e.employee_code}</td>
                        <td>{e.first_name} {e.last_name}</td>
                        <td><Badge status={e.role}/></td>
                        <td className="money">{e.hourly_rate > 0 ? fmt(e.hourly_rate) : '—'}</td>
                        <td className="money">{e.flag_rate > 0 ? fmt(e.flag_rate) : '—'}</td>
                        <td>{e.is_active ? <span className="text-green">Active</span> : <span className="text-red">Inactive</span>}</td>
                        <td style={{textAlign:'right'}}><i className="fas fa-edit text-muted"></i></td>
                    </tr>
                ))}
                {!employees.length && <tr><td colSpan="7" className="text-muted" style={{textAlign:'center',padding:32}}>No employees found</td></tr>}
                </tbody></table>
            </div></div>
            <Modal open={showForm} onClose={() => setShowForm(false)} title={editId ? 'Edit Employee' : 'New Employee'}>
                <div className="form-grid">
                    <div className="form-group"><label>First Name *</label><input value={form.first_name} onChange={e => setForm({...form, first_name: e.target.value})} /></div>
                    <div className="form-group"><label>Last Name *</label><input value={form.last_name} onChange={e => setForm({...form, last_name: e.target.value})} /></div>
                    <div className="form-group"><label>Employee Code</label><input value={form.employee_code} onChange={e => setForm({...form, employee_code: e.target.value})} placeholder="Auto-generated if blank" /></div>
                    <div className="form-group"><label>Role</label>
                        <select value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                            <option value="technician">Technician</option><option value="painter">Painter</option>
                            <option value="estimator">Estimator</option><option value="detailer">Detailer</option>
                            <option value="parts">Parts</option><option value="office">Office</option>
                            <option value="manager">Manager</option><option value="admin">Admin</option>
                        </select>
                    </div>
                    <div className="form-group"><label>Phone</label><input value={form.phone} onChange={e => setForm({...form, phone: e.target.value})} /></div>
                    <div className="form-group"><label>Email</label><input value={form.email} onChange={e => setForm({...form, email: e.target.value})} /></div>
                    <div className="form-group"><label>Hourly Rate</label><input type="number" step="0.01" value={form.hourly_rate} onChange={e => setForm({...form, hourly_rate: e.target.value})} placeholder="0.00" /></div>
                    <div className="form-group"><label>Flag Rate</label><input type="number" step="0.01" value={form.flag_rate} onChange={e => setForm({...form, flag_rate: e.target.value})} placeholder="0.00" /></div>
                    <div className="form-group"><label>Hire Date</label><input type="date" value={form.hire_date} onChange={e => setForm({...form, hire_date: e.target.value})} /></div>
                    <div className="form-group"><label>Status</label>
                        <select value={form.is_active} onChange={e => setForm({...form, is_active: parseInt(e.target.value)})}>
                            <option value={1}>Active</option><option value={0}>Inactive</option>
                        </select>
                    </div>
                </div>
                <div className="form-group" style={{marginTop:12}}><label>Notes</label><textarea value={form.notes} onChange={e => setForm({...form, notes: e.target.value})} /></div>
                <div className="modal-actions"><button className="btn btn-outline" onClick={() => setShowForm(false)}>Cancel</button><button className="btn btn-primary" onClick={save} disabled={!form.first_name||!form.last_name}><i className="fas fa-save"></i> {editId ? 'Update' : 'Save'}</button></div>
            </Modal>
        </div>
    );
}

// USER LOGINS (admin-only)
// ═══════════════════════════════════════════════════════════
function UsersPage({ user: currentUser }) {
    const [users, setUsers] = useState([]);
    const [employees, setEmployees] = useState([]);
    const [showForm, setShowForm] = useState(false);
    const [editId, setEditId] = useState(null);
    const [pinResetId, setPinResetId] = useState(null);
    const [newPin, setNewPin] = useState('');
    const [newPin2, setNewPin2] = useState('');
    const [error, setError] = useState('');
    const emptyUser = {username:'', pin:'', display_name:'', role:'worker', employee_id:''};
    const [form, setForm] = useState(emptyUser);

    const load = () => {
        api('/auth/users').then(setUsers).catch(e => setError(e.message || String(e)));
        api('/employees').then(setEmployees).catch(() => setEmployees([]));
    };
    useEffect(() => { load(); }, []);

    const openNew = () => { setEditId(null); setForm(emptyUser); setError(''); setShowForm(true); };
    const openEdit = (u) => {
        setEditId(u.id);
        setForm({
            username: u.username || '',
            pin: '',
            display_name: u.display_name || '',
            role: u.role || 'worker',
            employee_id: u.employee_id || '',
            is_active: u.is_active != null ? u.is_active : 1,
        });
        setError('');
        setShowForm(true);
    };

    const save = async () => {
        setError('');
        try {
            if (editId) {
                const body = {
                    display_name: form.display_name || null,
                    role: form.role,
                    employee_id: form.employee_id ? parseInt(form.employee_id) : null,
                    is_active: form.is_active ? 1 : 0,
                };
                await api(`/auth/users/${editId}`, { method: 'PUT', body });
            } else {
                if (!form.username) return setError('Username is required');
                if (!form.pin || form.pin.length < 4) return setError('PIN must be at least 4 digits');
                const body = {
                    username: form.username.trim().toLowerCase(),
                    pin: form.pin,
                    display_name: form.display_name || form.username,
                    role: form.role,
                    employee_id: form.employee_id ? parseInt(form.employee_id) : null,
                };
                await api('/auth/users', { method: 'POST', body });
            }
            setShowForm(false); setEditId(null); setForm(emptyUser); load();
        } catch (err) {
            setError(err.message || String(err));
        }
    };

    const openResetPin = (u) => {
        setPinResetId(u.id);
        setNewPin(''); setNewPin2(''); setError('');
    };

    const submitPinReset = async () => {
        setError('');
        if (!newPin || newPin.length < 4) return setError('PIN must be at least 4 digits');
        if (newPin !== newPin2) return setError('PINs do not match');
        try {
            await api(`/auth/users/${pinResetId}/reset-pin`, { method: 'POST', body: { pin: newPin } });
            setPinResetId(null); setNewPin(''); setNewPin2('');
            alert('PIN updated.');
        } catch (err) {
            setError(err.message || String(err));
        }
    };

    const targetUser = users.find(u => u.id === pinResetId);

    return (
        <div>
            <div className="page-header">
                <h2>User Logins</h2>
                <button className="btn btn-primary" onClick={openNew}><i className="fas fa-plus"></i> New User</button>
            </div>
            <div className="card" style={{padding: 16, marginBottom: 16, background: 'rgba(77,184,106,0.06)', borderLeft: '3px solid var(--primary)'}}>
                <div style={{fontSize: 13, color: 'var(--text-muted)', lineHeight: 1.5}}>
                    <strong style={{color:'var(--text)'}}>How logins work:</strong> Workers (technicians, painters) tap their name on the touch login screen and enter a 4+ digit PIN.
                    Office and admin users sign in with username + PIN through the admin login. Linking a user to an employee record lets the system attribute time cards and work to the right person.
                </div>
            </div>
            <div className="card"><div className="table-wrapper">
                <table>
                    <thead><tr><th>Username</th><th>Display Name</th><th>Role</th><th>Linked Employee</th><th>Last Login</th><th>Status</th><th></th></tr></thead>
                    <tbody>
                        {users.map(u => {
                            const emp = employees.find(e => e.id === u.employee_id);
                            return (
                                <tr key={u.id}>
                                    <td style={{fontWeight:600}}>{u.username}</td>
                                    <td>{u.display_name || '—'}</td>
                                    <td><Badge status={u.role}/></td>
                                    <td>{emp ? `${emp.first_name} ${emp.last_name}` : '—'}</td>
                                    <td className="text-sm text-muted">{u.last_login ? new Date(u.last_login).toLocaleString() : 'Never'}</td>
                                    <td>{u.is_active ? <span className="text-green">Active</span> : <span className="text-red">Disabled</span>}</td>
                                    <td style={{textAlign:'right', whiteSpace:'nowrap'}}>
                                        <button className="btn btn-outline btn-sm" onClick={() => openEdit(u)} style={{marginRight:6}}>
                                            <i className="fas fa-edit"></i> Edit
                                        </button>
                                        <button className="btn btn-outline btn-sm" onClick={() => openResetPin(u)}>
                                            <i className="fas fa-key"></i> Reset PIN
                                        </button>
                                    </td>
                                </tr>
                            );
                        })}
                        {!users.length && <tr><td colSpan="7" className="text-muted" style={{textAlign:'center',padding:32}}>No users yet</td></tr>}
                    </tbody>
                </table>
            </div></div>

            <Modal open={showForm} onClose={() => setShowForm(false)} title={editId ? 'Edit User' : 'New User Login'}>
                {error && <div style={{padding:10, background:'rgba(220,38,38,0.1)', border:'1px solid rgba(220,38,38,0.3)', borderRadius:6, color:'var(--danger)', marginBottom:12, fontSize:13}}>{error}</div>}
                <div className="form-grid">
                    <div className="form-group">
                        <label>Username *</label>
                        <input value={form.username}
                               onChange={e => setForm({...form, username: e.target.value})}
                               disabled={!!editId}
                               placeholder="lowercase, no spaces" />
                        {editId && <div className="text-sm text-muted" style={{marginTop:4}}>Username can't be changed.</div>}
                    </div>
                    <div className="form-group">
                        <label>Display Name</label>
                        <input value={form.display_name}
                               onChange={e => setForm({...form, display_name: e.target.value})}
                               placeholder="What appears on the login grid" />
                    </div>
                    {!editId && (
                        <div className="form-group">
                            <label>PIN * (4+ digits)</label>
                            <input type="password" inputMode="numeric" value={form.pin}
                                   onChange={e => setForm({...form, pin: e.target.value.replace(/\D/g,'')})}
                                   maxLength={8} placeholder="••••" />
                        </div>
                    )}
                    <div className="form-group">
                        <label>Role</label>
                        <select value={form.role} onChange={e => setForm({...form, role: e.target.value})}>
                            <option value="worker">Worker (touch login + TecStation)</option>
                            <option value="office">Office (full app, no user mgmt)</option>
                            <option value="admin">Admin (full access)</option>
                        </select>
                    </div>
                    <div className="form-group">
                        <label>Linked Employee</label>
                        <select value={form.employee_id || ''} onChange={e => setForm({...form, employee_id: e.target.value})}>
                            <option value="">— None —</option>
                            {employees.filter(e => e.is_active).map(e => (
                                <option key={e.id} value={e.id}>{e.first_name} {e.last_name} ({e.employee_code})</option>
                            ))}
                        </select>
                    </div>
                    {editId && (
                        <div className="form-group">
                            <label>Status</label>
                            <select value={form.is_active} onChange={e => setForm({...form, is_active: parseInt(e.target.value)})}>
                                <option value={1}>Active</option>
                                <option value={0}>Disabled (cannot login)</option>
                            </select>
                        </div>
                    )}
                </div>
                <div className="modal-actions">
                    <button className="btn btn-outline" onClick={() => setShowForm(false)}>Cancel</button>
                    <button className="btn btn-primary" onClick={save}>
                        <i className="fas fa-save"></i> {editId ? 'Update' : 'Create User'}
                    </button>
                </div>
            </Modal>

            <Modal open={!!pinResetId} onClose={() => setPinResetId(null)} title={`Reset PIN${targetUser ? ' for ' + (targetUser.display_name || targetUser.username) : ''}`}>
                {error && <div style={{padding:10, background:'rgba(220,38,38,0.1)', border:'1px solid rgba(220,38,38,0.3)', borderRadius:6, color:'var(--danger)', marginBottom:12, fontSize:13}}>{error}</div>}
                <div className="form-group">
                    <label>New PIN (4+ digits)</label>
                    <input type="password" inputMode="numeric" value={newPin}
                           onChange={e => setNewPin(e.target.value.replace(/\D/g,''))}
                           maxLength={8} placeholder="••••" autoFocus />
                </div>
                <div className="form-group" style={{marginTop:12}}>
                    <label>Confirm New PIN</label>
                    <input type="password" inputMode="numeric" value={newPin2}
                           onChange={e => setNewPin2(e.target.value.replace(/\D/g,''))}
                           maxLength={8} placeholder="••••" />
                </div>
                <div className="text-sm text-muted" style={{marginTop:8}}>
                    Tell the user their new PIN in person — it isn't emailed or shown again.
                </div>
                <div className="modal-actions">
                    <button className="btn btn-outline" onClick={() => setPinResetId(null)}>Cancel</button>
                    <button className="btn btn-primary" onClick={submitPinReset}>
                        <i className="fas fa-key"></i> Update PIN
                    </button>
                </div>
            </Modal>
        </div>
    );
}

}

function ProductionPage({ navigate }) {

    return (
        <div>

// TOUCH LOGIN SCREEN (for worker touchscreen PCs)
// Tap your name → enter 4-digit PIN on touch pad → auto-login
// ═══════════════════════════════════════════════════════════
function TouchLoginScreen({ onLogin, onAdminLogin }) {
    const [workers, setWorkers] = useState([]);
    const [selected, setSelected] = useState(null);
    const [pin, setPin] = useState('');
    const [error, setError] = useState('');
    const [loading, setLoading] = useState(false);

    useEffect(() => {
        api('/auth/workers').then(setWorkers).catch(() => {});
    }, []);

    const handlePinKey = async (digit) => {
        if (loading) return;
        const newPin = pin + digit;
        setPin(newPin);
        setError('');
        if (newPin.length === 4) {
            // Auto-submit on 4th digit
            setLoading(true);
            try {
                const result = await api('/auth/login', {
                    method: 'POST',
                    body: { username: selected.username, pin: newPin }
                });
                setAuthToken(result.token);
                onLogin(result);
            } catch (err) {
                setError('Wrong PIN — try again');
                setPin('');
            }
            setLoading(false);
        }
    };

    const handleBackspace = () => {
        setPin(prev => prev.slice(0, -1));
        setError('');
    };

    const handleBack = () => {
        setSelected(null);
        setPin('');
        setError('');
    };

    // PIN Pad screen (after selecting a worker)
    if (selected) {
        return (
            <div className="touch-login">
                <div style={{textAlign: 'center', marginBottom: 24}}>
                    <img src="/logo.png" alt="WR Big Rig" style={{height: 60, marginBottom: 12}} />
                </div>
                <div style={{textAlign: 'center', marginBottom: 24}}>
                    <div style={{fontSize: 28, fontWeight: 700, color: 'var(--primary)'}}>
                        <i className="fas fa-user-circle" style={{marginRight: 10}}></i>
                        {selected.display_name || selected.username}
                    </div>
                    <div style={{fontSize: 16, color: 'var(--text-muted)', marginTop: 4}}>Enter your 4-digit PIN</div>
                </div>

                {/* PIN dots */}
                <div className="pin-dots">
                    {[0,1,2,3].map(i => (
                        <div key={i} className={`pin-dot ${i < pin.length ? 'filled' : ''}`}></div>
                    ))}
                </div>

                {error && <div style={{textAlign: 'center', color: 'var(--red)', fontSize: 18, marginBottom: 16, fontWeight: 600}}>
                    <i className="fas fa-exclamation-triangle"></i> {error}
                </div>}

                {loading && <div style={{textAlign: 'center', marginBottom: 16}}>
                    <i className="fas fa-spinner fa-spin" style={{fontSize: 28, color: 'var(--primary)'}}></i>
                </div>}

                {/* Number pad */}
                <div className="pin-pad">
                    {[1,2,3,4,5,6,7,8,9].map(d => (
                        <button key={d} className="pin-key" onClick={() => handlePinKey(String(d))}>{d}</button>
                    ))}
                    <button className="pin-key pin-key-back" onClick={handleBack}>
                        <i className="fas fa-arrow-left"></i>
                    </button>
                    <button className="pin-key" onClick={() => handlePinKey('0')}>0</button>
                    <button className="pin-key pin-key-back" onClick={handleBackspace}>
                        <i className="fas fa-backspace"></i>
                    </button>
                </div>
            </div>
        );
    }

    // Worker selection grid
    return (
        <div className="touch-login">
            <div style={{textAlign: 'center', marginBottom: 24}}>
                <img src="/logo.png" alt="WR Big Rig" style={{height: 80, marginBottom: 8}} />
                <div style={{fontSize: 16, color: 'var(--text-muted)'}}>Tap your name to clock in</div>
            </div>

            <div className="worker-grid">
                {workers.map(w => (
                    <button key={w.id} className="worker-card" onClick={() => setSelected(w)}>
                        <i className="fas fa-user-circle" style={{fontSize: 40, marginBottom: 8, color: 'var(--primary)'}}></i>
                        <div style={{fontSize: 20, fontWeight: 700}}>{w.display_name || w.username}</div>
                        {w.employee_id && <div style={{fontSize: 12, color: 'var(--text-muted)', marginTop: 2}}>#{w.employee_id}</div>}
                    </button>
                ))}
            </div>

            <div style={{textAlign: 'center', marginTop: 32}}>
                <button className="btn btn-outline" style={{fontSize: 14, padding: '10px 24px'}} onClick={onAdminLogin}>
                    <i className="fas fa-shield-alt"></i> Admin / Office Login
                </button>
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// WORKER TIME CLOCK (touch optimized — NO actual time display)
// Shows only elapsed timer after clock-in + today's total
// ═══════════════════════════════════════════════════════════
function TimeClock({ user }) {
    const [tick, setTick] = useState(Date.now());
    const [clockedIn, setClockedIn] = useState(false);
    const [clockInTime, setClockInTime] = useState(null);
    const [todayHours, setTodayHours] = useState(0);
    const [activeRo, setActiveRo] = useState(null);
    const [myJobs, setMyJobs] = useState([]);

    useEffect(() => {
        const t = setInterval(() => setTick(Date.now()), 1000);
        return () => clearInterval(t);
    }, []);

    useEffect(() => {
        if (user.employee_id) {
            api('/time-cards?employee_id=' + user.employee_id).then(cards => {
                const today = new Date().toISOString().slice(0, 10);
                const todayCards = cards.filter(c => c.clock_in && c.clock_in.startsWith(today));
                const openCard = todayCards.find(c => !c.clock_out);
                if (openCard) {
                    setClockedIn(true);
                    setClockInTime(new Date(openCard.clock_in));
                    setActiveRo(openCard.ro_id);
                }
                const hours = todayCards.reduce((sum, c) => sum + (c.hours_worked || 0), 0);
                setTodayHours(hours);
            }).catch(() => {});
        }
    }, [user.employee_id]);

    useEffect(() => {
        api('/repair-orders?status=in_progress').then(ros => {
            const mine = ros.filter(ro =>
                ro.technician_id === user.employee_id ||
                ro.painter_id === user.employee_id
            );
            setMyJobs(mine);
        }).catch(() => {});
    }, [user.employee_id]);

    const handleClockIn = async (roId = null) => {
        try {
            const body = {
                employee_id: user.employee_id,
                clock_in: new Date().toISOString().replace('T', ' ').slice(0, 19),
                activity_type: 'production',
            };
            if (roId) body.ro_id = roId;
            await api('/time-cards', { method: 'POST', body });
            setClockedIn(true);
            setClockInTime(new Date());
            setActiveRo(roId);
        } catch (err) {
            alert('Clock in failed: ' + err.message);
        }
    };

    const handleClockOut = async () => {
        try {
            const cards = await api('/time-cards?employee_id=' + user.employee_id);
            const openCard = cards.find(c => !c.clock_out);
            if (openCard) {
                const now = new Date();
                const cIn = new Date(openCard.clock_in);
                const hours = ((now - cIn) / 3600000).toFixed(2);
                await api(`/time-cards/${openCard.id}`, {
                    method: 'PUT',
                    body: {
                        clock_out: now.toISOString().replace('T', ' ').slice(0, 19),
                        hours_worked: parseFloat(hours),
                    }
                });
            }
            const addedHrs = clockInTime ? ((new Date() - clockInTime) / 3600000) : 0;
            setClockedIn(false);
            setClockInTime(null);
            setActiveRo(null);
            setTodayHours(prev => prev + addedHrs);
        } catch (err) {
            alert('Clock out failed: ' + err.message);
        }
    };

    const elapsed = clockedIn && clockInTime ? Math.floor((tick - clockInTime.getTime()) / 1000) : 0;
    const elapsedStr = `${Math.floor(elapsed/3600)}:${String(Math.floor((elapsed%3600)/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;

    return (
        <div style={{textAlign: 'center', padding: '16px 0'}}>

            {/* Clocked IN state: big elapsed timer */}
            {clockedIn ? (
                <div>
                    <div style={{fontSize: 16, color: '#22c55e', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 2, marginBottom: 8}}>
                        <i className="fas fa-circle" style={{fontSize: 12, marginRight: 8, animation: 'pulse 2s infinite'}}></i> Clocked In
                    </div>
                    <div style={{fontSize: 72, fontWeight: 800, fontFamily: 'monospace', color: '#fff', letterSpacing: 4, margin: '16px 0 24px'}}>
                        {elapsedStr}
                    </div>
                    {activeRo && <div style={{fontSize: 16, color: 'var(--text-muted)', marginBottom: 16}}>
                        Working on RO #{activeRo}
                    </div>}
                    <button className="touch-btn touch-btn-danger" onClick={handleClockOut} style={{minWidth: 280}}>
                        <i className="fas fa-stop"></i> Clock Out
                    </button>
                </div>
            ) : (
                /* Clocked OUT state: big clock-in button */
                <div>
                    <div style={{fontSize: 16, color: 'var(--text-muted)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 2, marginBottom: 24}}>
                        <i className="far fa-circle" style={{fontSize: 12, marginRight: 8}}></i> Not Clocked In
                    </div>
                    <button className="touch-btn touch-btn-success" onClick={() => handleClockIn()} style={{minWidth: 280, marginBottom: 24}}>
                        <i className="fas fa-play"></i> Clock In
                    </button>

                    {/* Quick clock-in to a specific job */}
                    {myJobs.length > 0 && (
                        <div style={{marginTop: 16}}>
                            <div style={{fontSize: 14, color: 'var(--text-muted)', marginBottom: 12}}>Or clock in to a specific job:</div>
                            <div style={{display: 'flex', flexWrap: 'wrap', gap: 12, justifyContent: 'center'}}>
                                {myJobs.map(job => (
                                    <button key={job.id} className="touch-btn touch-btn-primary" style={{minWidth: 200, fontSize: 16}}
                                            onClick={() => handleClockIn(job.id)}>
                                        <i className="fas fa-play"></i> {job.ro_number}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            )}

            {/* Today's total hours */}
            <div style={{marginTop: 32, padding: '16px 24px', background: 'var(--bg-card)', borderRadius: 12, display: 'inline-block', border: '1px solid var(--border)'}}>
                <div style={{fontSize: 14, color: 'var(--text-muted)', marginBottom: 4}}>Today's Total</div>
                <div style={{fontSize: 32, fontWeight: 700, fontFamily: 'monospace', color: 'var(--primary)'}}>
                    {(todayHours + (clockedIn ? elapsed/3600 : 0)).toFixed(1)}h
                </div>
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// MY JOBS — touch-optimized with large move buttons
// ═══════════════════════════════════════════════════════════
function MyJobsView({ user }) {
    const [jobs, setJobs] = useState([]);
    const [moving, setMoving] = useState(null);

    const load = () => {
        if (user.employee_id) {
            api(`/tecstation/my-jobs/${user.employee_id}`).then(setJobs).catch(console.error);
        }
    };
    useEffect(() => { load(); }, [user.employee_id]);

    const deptColors = {
        lot: '#94a3b8', body: '#3b82f6', frame: '#8b5cf6', mechanical: '#f97316',
        paint: '#eab308', detail: '#22c55e', assembly: '#06b6d4', glass: '#a855f7',
        qa: '#ec4899', ready: '#10b981', delivered: '#6b7280'
    };
    const deptLabels = {
        lot:'Lot', body:'Body', frame:'Frame', mechanical:'Mechanical',
        paint:'Paint', detail:'Detail', assembly:'Assembly', glass:'Glass',
        qa:'QA', ready:'Ready', delivered:'Delivered'
    };
    const DEPTS = ['lot','body','frame','mechanical','paint','detail','assembly','glass','qa','ready','delivered'];

    const moveVehicle = async (roId, toDept) => {
        try {
            await api('/tecstation/move', {
                method: 'POST',
                body: { ro_id: roId, to_department: toDept, moved_by: user.employee_id }
            });
            setMoving(null);
            load();
        } catch (err) {
            alert(err.message);
        }
    };

    return (
        <div>
            <div className="page-header" style={{marginBottom: 16}}>
                <h2 style={{fontSize: 22}}>My Assigned Jobs</h2>
                <button className="touch-btn" onClick={load} style={{fontSize: 16, padding: '10px 20px', background: 'transparent', border: '1px solid var(--border)', color: 'var(--text-muted)'}}>
                    <i className="fas fa-sync"></i> Refresh
                </button>
            </div>
            {jobs.length === 0 ? (
                <div className="empty-state"><i className="fas fa-inbox"></i><div style={{fontSize: 18}}>No jobs assigned to you right now</div></div>
            ) : jobs.map(job => (
                <div className="job-card" key={job.id} style={{padding: 20, marginBottom: 16, borderRadius: 12}}>
                    <div className="job-header" style={{marginBottom: 12}}>
                        <span className="job-title" style={{fontSize: 22}}>{job.ro_number}</span>
                        <div className="flex items-center gap-2">
                            <span className="badge" style={{background: `${deptColors[job.current_department]}22`, color: deptColors[job.current_department], fontSize: 14, padding: '6px 12px'}}>
                                {deptLabels[job.current_department] || job.current_department}
                            </span>
                        </div>
                    </div>
                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12, fontSize: 16}}>
                        <span><i className="fas fa-truck" style={{width: 20}}></i> {[job.year, job.make, job.model].filter(Boolean).join(' ')}</span>
                        <span><i className="fas fa-palette" style={{width: 20}}></i> {job.color || '—'}</span>
                        <span><i className="fas fa-id-card" style={{width: 20}}></i> {job.license_plate || '—'}</span>
                        <span><i className="fas fa-calendar" style={{width: 20}}></i> Target: {fmtDate(job.target_delivery_date)}</span>
                    </div>

                    {/* Move vehicle — large touch buttons */}
                    {moving === job.id ? (
                        <div style={{marginTop: 12}}>
                            <div style={{fontSize: 16, color: 'var(--text-muted)', marginBottom: 10, fontWeight: 600}}>Move to department:</div>
                            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(120px, 1fr))', gap: 10}}>
                                {DEPTS.filter(d => d !== job.current_department).map(d => (
                                    <button key={d} className="touch-move-btn" onClick={() => moveVehicle(job.id, d)}
                                            style={{borderColor: deptColors[d], color: deptColors[d]}}>
                                        {deptLabels[d]}
                                    </button>
                                ))}
                            </div>
                            <button className="touch-btn" onClick={() => setMoving(null)}
                                    style={{marginTop: 10, background: 'transparent', border: '1px solid var(--border)', color: 'var(--text-muted)', width: '100%'}}>
                                Cancel
                            </button>
                        </div>
                    ) : (
                        <button className="touch-btn touch-btn-primary" style={{width: '100%', marginTop: 4}} onClick={() => setMoving(job.id)}>
                            <i className="fas fa-arrow-right"></i> Move Vehicle
                        </button>
                    )}

                    {/* Line items */}
                    {job.my_lines && job.my_lines.length > 0 && (
                        <div style={{marginTop: 16, borderTop: '1px solid var(--border)', paddingTop: 12}}>
                            <div style={{fontSize: 13, color: 'var(--text-muted)', marginBottom: 6, textTransform: 'uppercase', fontWeight: 600}}>Operations</div>
                            {job.my_lines.map(line => (
                                <div key={line.id} style={{fontSize: 15, padding: '6px 0', display: 'flex', justifyContent: 'space-between', borderBottom: '1px solid var(--border)'}}>
                                    <span>{line.line_number}. {line.description}</span>
                                    <span style={{color: 'var(--text-muted)', fontWeight: 600}}>{line.labor_hours || line.paint_hours || 0}h</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            ))}
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// SHOP BOARD — touch-friendly Kanban
// ═══════════════════════════════════════════════════════════
function ShopBoardView({ user }) {
    const [board, setBoard] = useState(null);
    const [moving, setMoving] = useState(null);

    const load = () => api('/tecstation/board').then(setBoard).catch(console.error);
    useEffect(() => { load(); const t = setInterval(load, 30000); return () => clearInterval(t); }, []);

    const deptColors = {
        lot: '#94a3b8', body: '#3b82f6', frame: '#8b5cf6', mechanical: '#f97316',
        paint: '#eab308', detail: '#22c55e', assembly: '#06b6d4', glass: '#a855f7',
        qa: '#ec4899', ready: '#10b981', delivered: '#6b7280'
    };
    const deptLabels = {
        lot:'Lot', body:'Body', frame:'Frame', mechanical:'Mechanical',
        paint:'Paint', detail:'Detail', assembly:'Assembly', glass:'Glass',
        qa:'QA', ready:'Ready', delivered:'Delivered'
    };
    const DEPTS = ['lot','body','frame','mechanical','paint','detail','assembly','glass','qa','ready'];

    const moveVehicle = async (roId, toDept) => {
        try {
            await api('/tecstation/move', {
                method: 'POST',
                body: { ro_id: roId, to_department: toDept, moved_by: user.employee_id }
            });
            setMoving(null);
            load();
        } catch (err) { alert(err.message); }
    };

    if (!board) return <div className="empty-state"><i className="fas fa-spinner fa-spin" style={{fontSize: 32}}></i></div>;

    return (
        <div>
            <div className="page-header" style={{marginBottom: 16}}>
                <h2 style={{fontSize: 22}}>Shop Board</h2>
                <button className="touch-btn" onClick={load} style={{fontSize: 16, padding: '10px 20px', background: 'transparent', border: '1px solid var(--border)', color: 'var(--text-muted)'}}>
                    <i className="fas fa-sync"></i> Refresh
                </button>
            </div>
            <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 14, padding: '0 8px'}}>
                {DEPTS.map(dept => (
                    <div key={dept} style={{background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 10, overflow: 'hidden'}}>
                        <div style={{padding: '12px 16px', background: `${deptColors[dept]}15`, borderBottom: `3px solid ${deptColors[dept]}`,
                                     display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <span style={{fontWeight: 700, fontSize: 16, color: deptColors[dept]}}>{deptLabels[dept]}</span>
                            <span style={{fontSize: 14, color: 'var(--text-muted)', background: 'var(--bg)', padding: '4px 10px', borderRadius: 6, fontWeight: 700}}>
                                {(board[dept] || []).length}
                            </span>
                        </div>
                        <div style={{padding: 10, minHeight: 80}}>
                            {(board[dept] || []).map(v => (
                                <div key={v.id} style={{background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 8, padding: 12, marginBottom: 8, fontSize: 14,
                                    borderLeft: v.priority === 'rush' ? '4px solid var(--red)' : v.priority === 'high' ? '4px solid var(--orange)' : '4px solid transparent'}}>
                                    <div style={{fontWeight: 700, color: 'var(--primary)', fontSize: 16}}>{v.ro_number}</div>
                                    <div style={{color: 'var(--text-muted)', fontSize: 14}}>{[v.year, v.make, v.model].filter(Boolean).join(' ')}</div>
                                    <div style={{color: 'var(--text-muted)', fontSize: 14}}>{v.color}</div>
                                    {v.target_delivery_date && <div style={{fontSize: 13, marginTop: 4}}>
                                        <i className="fas fa-calendar" style={{fontSize: 11}}></i> {fmtDate(v.target_delivery_date)}
                                    </div>}
                                    {moving === `${v.id}-${dept}` ? (
                                        <div style={{marginTop: 8}}>
                                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6}}>
                                                {DEPTS.filter(d => d !== dept).map(d => (
                                                    <button key={d} className="touch-move-btn" style={{borderColor: deptColors[d], color: deptColors[d], padding: '8px 4px', fontSize: 12}}
                                                            onClick={() => moveVehicle(v.id, d)}>
                                                        {deptLabels[d]}
                                                    </button>
                                                ))}
                                                <button className="touch-move-btn" style={{borderColor: deptColors.delivered, color: deptColors.delivered, padding: '8px 4px', fontSize: 12}}
                                                        onClick={() => moveVehicle(v.id, 'delivered')}>
                                                    Delivered
                                                </button>
                                            </div>
                                            <button style={{marginTop: 6, width: '100%', padding: '6px', background: 'transparent',
                                                border: '1px solid var(--border)', color: 'var(--text-muted)', borderRadius: 6, cursor: 'pointer', fontSize: 12}}
                                                onClick={() => setMoving(null)}>Cancel</button>
                                        </div>
                                    ) : (
                                        <button className="touch-move-btn" style={{marginTop: 8, width: '100%', borderColor: deptColors[dept], color: deptColors[dept]}}
                                            onClick={() => setMoving(`${v.id}-${dept}`)}>
                                            <i className="fas fa-arrow-right"></i> Move
                                        </button>
                                    )}
                                </div>
                            ))}
                            {(board[dept] || []).length === 0 && (
                                <div style={{textAlign: 'center', padding: 20, color: 'var(--text-muted)', fontSize: 13}}>Empty</div>
                            )}
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// ADMIN / OFFICE VIEW (full app with sidebar)
// ═══════════════════════════════════════════════════════════
function AdminView({ user, onLogout }) {
    const [page, setPage] = useState('dashboard');
    const [detailId, setDetailId] = useState(null);

    const navigate = (target, id = null) => {
        setPage(target);
        setDetailId(id);
        window.scrollTo(0, 0);
    };

    const sidebarPage = page.includes('detail') ? page.replace(/-detail$/, 's').replace('est-detail', 'estimates').replace('ro-detail', 'repair-orders').replace('customer-details', 'customers') :
                         page === 'est-new' ? 'estimates' : page;

    let content;
    switch (page) {
        case 'dashboard': content = <Dashboard navigate={navigate} />; break;
        case 'customers': content = <CustomersPage navigate={navigate} />; break;
        case 'customer-detail': content = <CustomerDetail id={detailId} navigate={navigate} />; break;
        case 'vehicles': content = <VehiclesPage navigate={navigate} />; break;
        case 'vehicle-detail': content = <VehicleDetail id={detailId} navigate={navigate} />; break;
        case 'estimates': content = <EstimatesPage navigate={navigate} />; break;
        case 'est-new': content = <NewEstimate navigate={navigate} />; break;
        case 'est-detail': content = <EstimateDetail id={detailId} navigate={navigate} />; break;
        case 'repair-orders': content = <RepairOrdersPage navigate={navigate} />; break;
        case 'ro-detail': content = <RODetail id={detailId} navigate={navigate} />; break;
        case 'insurance': content = <InsurancePage navigate={navigate} />; break;
        case 'employees': content = <EmployeesPage navigate={navigate} />; break;
        case 'vendors': content = <VendorsPage navigate={navigate} />; break;
        case 'production': content = <ProductionPage navigate={navigate} />; break;
        case 'reports': content = <ReportsPage />; break;
        case 'settings': content = <SettingsPage />; break;
        case 'users': content = <UsersPage user={user} />; break;
        default: content = <Dashboard navigate={navigate} />;
    }

    return (
        <div className="app">
            <Sidebar page={sidebarPage} setPage={p => navigate(p)} user={user} onLogout={onLogout} />
            <div className="main">{content}</div>
        </div>
    );
}

// ═══════════════════════════════════════════════════════════
// APP ROOT — routes workers to touch login, admin to standard
// ═══════════════════════════════════════════════════════════
function App() {
    const [user, setUser] = useState(null);
    const [checking, setChecking] = useState(true);
    const [loginMode, setLoginMode] = useState('touch'); // 'touch' or 'admin'

    // On mount, check if we have a valid token
    useEffect(() => {
        if (_authToken) {
            api('/auth/me').then(u => {
                setUser(u);
                setChecking(false);
            }).catch(() => {
                setAuthToken(null);
                setChecking(false);
            });
        } else {
            setChecking(false);
        }
    }, []);

    // Listen for auth expiry events
    useEffect(() => {
        const handler = () => { setUser(null); };
        window.addEventListener('auth-expired', handler);
        return () => window.removeEventListener('auth-expired', handler);
    }, []);

    const handleLogin = (result) => {
        setUser({
            id: result.user_id,
            username: result.username,
            display_name: result.display_name,
            role: result.role,
            employee_id: result.employee_id,
        });
    };

    const handleLogout = () => {
        api('/auth/logout', { method: 'POST' }).catch(() => {});
        setAuthToken(null);
        setUser(null);
        setLoginMode('touch');
    };

    if (checking) {
        return <div className="login-container"><div className="login-box"><i className="fas fa-spinner fa-spin" style={{fontSize: 32, color: 'var(--primary)'}}></i></div></div>;
    }

    if (!user) {
        if (loginMode === 'admin') {
            return <LoginScreen onLogin={handleLogin} onBack={() => setLoginMode('touch')} />;
        }
        return <TouchLoginScreen onLogin={handleLogin} onAdminLogin={() => setLoginMode('admin')} />;
    }

    // Workers get the touch-friendly TecStation
    if (user.role === 'worker') {
        return <WorkerView user={user} onLogout={handleLogout} />;
    }

    // Admin and office users get the full app
    return <AdminView user={user} onLogout={handleLogout} />;
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
